name: Governance Efficiency Benchmark

on:
  push:
    branches: [develop]
    paths:
      - "scripts/govern_bench/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "scripts/govern_bench/**"
  workflow_dispatch:
    inputs:
      tasks:
        description: "Task IDs to run (comma-separated, e.g. T1,T2,T6,T7). Leave blank for all."
        required: false
        default: "T1,T2,T6,T7,T10,T11,T13"
      conditions:
        description: "Condition IDs (comma-separated). Blank = all 13. Key: UNGOVERNED,SPECSMITH_LIGHT,SPECSMITH_FULL,SPECSMITH_DISPATCH."
        required: false
        default: ""
      reps:
        description: "Repetitions per cell (2 = cost run; 5 = publication)"
        required: false
        default: "5"
      tiers:
        description: "Tiers to run (comma-separated: nano,mini,mid,frontier). Blank = all."
        required: false
        default: ""
      dry_run:
        description: "Dry-run mode — no real API calls, deterministic dummy data"
        required: false
        type: boolean
        default: false

permissions: {}

env:
  SPECSMITH_NO_AUTO_UPDATE: "1"
  SPECSMITH_PYPI_CHECKED: "1"
  SPECSMITH_ALLOW_NON_PIPX: "1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # smoke — always runs on push/PR in dry-run mode
  # Validates harness structure loads and --list works.
  # ──────────────────────────────────────────────────────────────────────────
  smoke:
    name: Benchmark smoke test (dry-run)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Verify task registry loads
        run: python scripts/govern_bench/run_bench.py --list

      - name: Dry-run benchmark — OpenAI (T6, T7, T10, T11, T13)
        env:
          BENCH_DRY_RUN: "1"
        run: |
          python scripts/govern_bench/run_bench.py \
            --task T6 --task T7 --task T10 --task T11 --task T13 \
            --provider openai --model gpt-4o-mini \
            --reps 2 \
            --output /tmp/bench-smoke-openai.md \
            --json-output /tmp/bench-smoke-openai.json

      - name: Dry-run benchmark — HuggingFace (T6, T7)
        env:
          BENCH_DRY_RUN: "1"
        run: |
          python scripts/govern_bench/run_bench.py \
            --task T6 --task T7 \
            --provider huggingface --model Qwen/Qwen2.5-7B-Instruct \
            --reps 2 \
            --output /tmp/bench-smoke-hf.md \
            --json-output /tmp/bench-smoke-hf.json

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: bench-smoke-report
          path: |
            /tmp/bench-smoke-openai.md
            /tmp/bench-smoke-openai.json
            /tmp/bench-smoke-hf.md
            /tmp/bench-smoke-hf.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # bench-matrix — full tier × provider matrix
  #
  # Tier breakdown (15 models, 4 providers):
  #   nano        : gpt-4.1-nano                        (openai)
  #   mini        : gpt-4o-mini                         (openai)
  #                 claude-haiku-4-5                    (anthropic)
  #                 gemini-2.0-flash                    (google)
  #   mid         : gpt-4.1                             (openai)
  #                 claude-sonnet-4-5                   (anthropic)
  #                 gemini-2.5-flash                    (google)
  #   frontier    : gpt-5.5                             (openai)
  #                 claude-opus-4-5                     (anthropic)
  #                 gemini-2.5-pro                      (google)
  #   open_source : Qwen2.5-7B-Instruct                 (huggingface)
  #                 Qwen2.5-72B-Instruct                (huggingface)
  #                 Llama-3.1-8B-Instruct               (huggingface)
  #                 Llama-3.3-70B-Instruct              (huggingface)
  #                 Mistral-7B-Instruct-v0.3            (huggingface)
  #
  # Jobs that lack an API key secret skip gracefully (continue-on-error).
  # ──────────────────────────────────────────────────────────────────────────
  bench-matrix:
    name: "Bench [${{ matrix.tier }}] ${{ matrix.provider }}/${{ matrix.model }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── nano ──────────────────────────────────────────────────────────
          - { provider: openai,     model: gpt-4.1-nano,       tier: nano     }
          # ── mini ──────────────────────────────────────────────────────────
          - { provider: openai,     model: gpt-4o-mini,        tier: mini     }
          - { provider: anthropic,  model: claude-haiku-4-5,   tier: mini     }
          - { provider: google,     model: gemini-2.0-flash,   tier: mini     }
          # ── mid ───────────────────────────────────────────────────────────
          - { provider: openai,     model: gpt-4.1,            tier: mid      }
          - { provider: anthropic,  model: claude-sonnet-4-5,  tier: mid      }
          - { provider: google,     model: gemini-2.5-flash,   tier: mid      }
          # ── frontier ──────────────────────────────────────────────────────────
          - { provider: openai,     model: gpt-5.5,            tier: frontier    }
          - { provider: anthropic,  model: claude-opus-4-5,    tier: frontier    }
          - { provider: google,     model: gemini-2.5-pro,     tier: frontier    }
          # ── open_source (via HuggingFace Inference API) ───────────────────────
          - { provider: huggingface, model: "Qwen/Qwen2.5-7B-Instruct",          tier: open_source }
          - { provider: huggingface, model: "Qwen/Qwen2.5-72B-Instruct",         tier: open_source }
          - { provider: huggingface, model: "meta-llama/Llama-3.1-8B-Instruct",  tier: open_source }
          - { provider: huggingface, model: "meta-llama/Llama-3.3-70B-Instruct", tier: open_source }
          - { provider: huggingface, model: "mistralai/Mistral-7B-Instruct-v0.3", tier: open_source }

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml click

      - name: Install provider SDK
        run: |
          case "${{ matrix.provider }}" in
            openai)       pip install openai ;;
            anthropic)    pip install anthropic ;;
            google)       pip install google-generativeai ;;
            huggingface)  pip install openai ;;  # HF Inference API is OpenAI-compatible
          esac

      - name: Check API key available
        id: key_check
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
        run: |
          case "${{ matrix.provider }}" in
            openai)       [ -n "$OPENAI_API_KEY" ]    && echo "ok=1" >> "$GITHUB_OUTPUT" || echo "ok=0" >> "$GITHUB_OUTPUT" ;;
            anthropic)    [ -n "$ANTHROPIC_API_KEY" ] && echo "ok=1" >> "$GITHUB_OUTPUT" || echo "ok=0" >> "$GITHUB_OUTPUT" ;;
            google)       [ -n "$GOOGLE_API_KEY" ]    && echo "ok=1" >> "$GITHUB_OUTPUT" || echo "ok=0" >> "$GITHUB_OUTPUT" ;;
            huggingface)  [ -n "$HF_TOKEN" ]          && echo "ok=1" >> "$GITHUB_OUTPUT" || echo "ok=0" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Skip — no API key configured
        if: steps.key_check.outputs.ok == '0' && github.event.inputs.dry_run != 'true'
        run: |
          echo "::warning::Skipping ${{ matrix.provider }}/${{ matrix.model }} — secret not set."
          exit 0

      - name: Build task arguments
        id: build-args
        run: |
          TASK_ARGS=""
          IFS=',' read -ra TASKS <<< "${{ github.event.inputs.tasks }}"
          for t in "${TASKS[@]}"; do
            t=$(echo "$t" | xargs)
            [ -n "$t" ] && TASK_ARGS="$TASK_ARGS --task $t"
          done
          echo "task_args=$TASK_ARGS" >> "$GITHUB_OUTPUT"

      - name: "Run benchmark — ${{ matrix.tier }} / ${{ matrix.provider }} / ${{ matrix.model }}"
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          BENCH_DRY_RUN:     ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          BENCH_MAX_TURNS:   "12"
        run: |
          DRY_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_FLAG="--dry-run"
          # Filesystem-safe slug: openai_gpt-4o-mini
          SLUG="${{ matrix.provider }}_$(echo '${{ matrix.model }}' | tr '.' '-')"

          python scripts/govern_bench/run_bench.py \
            ${{ steps.build-args.outputs.task_args }} \
            --reps ${{ github.event.inputs.reps || '2' }} \
            --provider ${{ matrix.provider }} \
            --model    ${{ matrix.model }} \
            --output   bench-report-${SLUG}.md \
            --json-output bench-results-${SLUG}.json \
            $DRY_FLAG

      - name: Upload per-model artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.provider }}-${{ matrix.model }}-${{ github.run_id }}
          path: |
            bench-report-*.md
            bench-results-*.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # compare — downloads ALL model artifacts, generates unified tier report
  # ──────────────────────────────────────────────────────────────────────────
  compare:
    name: Cross-model comparison (all tiers)
    runs-on: ubuntu-latest
    needs: bench-matrix
    if: always() && github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      # One download step per matrix entry (continue-on-error for skipped jobs)
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-openai-gpt-4.1-nano-${{ github.run_id }}",     path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-openai-gpt-4o-mini-${{ github.run_id }}",      path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-anthropic-claude-haiku-4-5-${{ github.run_id }}", path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-google-gemini-2.0-flash-${{ github.run_id }}",  path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-openai-gpt-4.1-${{ github.run_id }}",           path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-anthropic-claude-sonnet-4-5-${{ github.run_id }}", path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-google-gemini-2.5-flash-${{ github.run_id }}",  path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-openai-gpt-5.5-${{ github.run_id }}",           path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-anthropic-claude-opus-4-5-${{ github.run_id }}",  path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-google-gemini-2.5-pro-${{ github.run_id }}",    path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-huggingface-Qwen-Qwen2.5-7B-Instruct-${{ github.run_id }}",          path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-huggingface-Qwen-Qwen2.5-72B-Instruct-${{ github.run_id }}",         path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-huggingface-meta-llama-Llama-3.1-8B-Instruct-${{ github.run_id }}",  path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-huggingface-meta-llama-Llama-3.3-70B-Instruct-${{ github.run_id }}", path: results/}}
      - {uses: actions/download-artifact@v4, continue-on-error: true, with: {name: "bench-huggingface-mistralai-Mistral-7B-Instruct-v0.3-${{ github.run_id }}", path: results/}}

      - name: Generate unified tier comparison report
        run: |
          INPUTS=""
          for f in results/bench-results-*.json; do
            [ -f "$f" ] || continue
            # Slug format: bench-results-<provider>_<model-with-dashes>.json
            # Reconstruct label as provider/model
            SLUG=$(basename "$f" .json | sed 's/bench-results-//')
            PROVIDER=$(echo "$SLUG" | cut -d_ -f1)
            MODEL_SLUG=$(echo "$SLUG" | cut -d_ -f2-)
            # Re-expand known dot-version model names
            MODEL=$(echo "$MODEL_SLUG" | sed \
              -e 's/gpt-4o-mini/gpt-4o-mini/' \
              -e 's/gpt-4-1-nano/gpt-4.1-nano/' \
              -e 's/gpt-4-1/gpt-4.1/' \
              -e 's/gpt-5-5/gpt-5.5/' \
              -e 's/claude-haiku-4-5/claude-haiku-4-5/' \
              -e 's/claude-sonnet-4-5/claude-sonnet-4-5/' \
              -e 's/claude-opus-4-5/claude-opus-4-5/' \
              -e 's/gemini-2-0-flash/gemini-2.0-flash/' \
              -e 's/gemini-2-5-flash/gemini-2.5-flash/' \
              -e 's/gemini-2-5-pro/gemini-2.5-pro/')
            LABEL="${PROVIDER}/${MODEL}"
            INPUTS="$INPUTS $f:$LABEL"
          done
          if [ -z "$INPUTS" ]; then
            echo "No result files found — all provider jobs may have been skipped."
            exit 0
          fi
          echo "Comparing:$INPUTS"
          python scripts/govern_bench/compare_runs.py \
            $INPUTS \
            --output docs/site/model-comparison.md
          cat docs/site/model-comparison.md

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: bench-comparison-${{ github.run_id }}
          path: docs/site/model-comparison.md
          retention-days: 30

      - name: Post summary
        if: always()
        run: |
          echo "## GovernanceBench — Multi-Tier Model Comparison" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tasks | ${{ github.event.inputs.tasks || 'T1,T2,T6,T7,T10,T11,T13' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reps  | ${{ github.event.inputs.reps || '2' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tiers | nano · mini · mid · frontier · open_source |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Models (15) | gpt-4.1-nano · gpt-4o-mini · gpt-4.1 · gpt-5.5 · claude-haiku-4-5 · claude-sonnet-4-5 · claude-opus-4-5 · gemini-2.0-flash · gemini-2.5-flash · gemini-2.5-pro · Qwen2.5-7B · Qwen2.5-72B · Llama-3.1-8B · Llama-3.3-70B · Mistral-7B |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/site/model-comparison.md ]; then
            python -c "import re,pathlib; c=pathlib.Path('docs/site/model-comparison.md').read_text(); m=re.search(r'## Headline findings.*',c,re.DOTALL); print(m.group()[:3000] if m else '')" >> "$GITHUB_STEP_SUMMARY"
          fi
