name: Governance Efficiency Benchmark

on:
  push:
    branches: [develop]
    paths:
      - "scripts/govern_bench/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "scripts/govern_bench/**"
  workflow_dispatch:
    inputs:
      tasks:
        description: "Task IDs to run (comma-separated, e.g. T1,T2,T6,T7,T10,T11,T13). Leave blank for all."
        required: false
        default: "T1,T2,T6,T7,T10,T11,T13"
      conditions:
        description: "Condition IDs to run (comma-separated). Leave blank for all 6."
        required: false
        default: ""
      reps:
        description: "Repetitions per cell (default 2 for cost; use 5 for publication)"
        required: false
        default: "2"
      model:
        description: "OpenAI model to use"
        required: false
        default: "gpt-4o-mini"
      dry_run:
        description: "Use dry-run mode (no real API calls, deterministic dummy data)"
        required: false
        type: boolean
        default: false

permissions: {}

env:
  SPECSMITH_NO_AUTO_UPDATE: "1"
  SPECSMITH_PYPI_CHECKED: "1"
  SPECSMITH_ALLOW_NON_PIPX: "1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # smoke — always runs on push/PR in dry-run mode
  # Validates harness structure loads and --list works.
  # ──────────────────────────────────────────────────────────────────────────
  smoke:
    name: Benchmark smoke test (dry-run)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Verify task registry loads
        run: python scripts/govern_bench/run_bench.py --list

      - name: Dry-run benchmark (T6, T7, T10, T11, T13 — 2 reps)
        env:
          BENCH_DRY_RUN: "1"
        run: |
          python scripts/govern_bench/run_bench.py \
            --task T6 --task T7 --task T10 --task T11 --task T13 \
            --reps 2 \
            --output /tmp/bench-smoke.md \
            --json-output /tmp/bench-smoke.json

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: bench-smoke-report
          path: |
            /tmp/bench-smoke.md
            /tmp/bench-smoke.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # bench-matrix — runs both gpt-4o-mini and gpt-5.5 in parallel
  # then combines their results into a cross-model comparison report.
  # Triggered manually via workflow_dispatch OR on a schedule.
  # ──────────────────────────────────────────────────────────────────────────
  bench-matrix:
    name: Benchmark (${{ matrix.model }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    strategy:
      fail-fast: false   # let both models run even if one fails
      matrix:
        model:
          - gpt-4o-mini
          - gpt-5.5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml fastapi uvicorn httpx starlette click openai

      - name: Build task arguments
        id: build-args
        run: |
          TASK_ARGS=""
          IFS=',' read -ra TASKS <<< "${{ github.event.inputs.tasks }}"
          for t in "${TASKS[@]}"; do
            t=$(echo "$t" | xargs)
            [ -n "$t" ] && TASK_ARGS="$TASK_ARGS --task $t"
          done
          echo "task_args=$TASK_ARGS" >> "$GITHUB_OUTPUT"

      - name: Run benchmark (${{ matrix.model }})
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BENCH_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          BENCH_MAX_TURNS: "12"
        run: |
          DRY_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_FLAG="--dry-run"
          MODEL=$(echo "${{ matrix.model }}" | tr '.' '-')

          python scripts/govern_bench/run_bench.py \
            ${{ steps.build-args.outputs.task_args }} \
            --reps ${{ github.event.inputs.reps || '2' }} \
            --model ${{ matrix.model }} \
            --output bench-report-${MODEL}.md \
            --json-output bench-results-${MODEL}.json \
            $DRY_FLAG

      - name: Upload per-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.model }}-${{ github.run_id }}
          path: |
            bench-report-*.md
            bench-results-*.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # compare — downloads both model results, generates cross-model report
  # ──────────────────────────────────────────────────────────────────────────
  compare:
    name: Cross-model comparison
    runs-on: ubuntu-latest
    needs: bench-matrix
    if: always() && github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Download gpt-4o-mini results
        uses: actions/download-artifact@v4
        with:
          name: bench-gpt-4o-mini-${{ github.run_id }}
          path: results/
        continue-on-error: true

      - name: Download gpt-5.5 results
        uses: actions/download-artifact@v4
        with:
          name: bench-gpt-5.5-${{ github.run_id }}
          path: results/
        continue-on-error: true

      - name: Generate comparison report
        run: |
          INPUTS=""
          for f in results/bench-results-*.json; do
            [ -f "$f" ] || continue
            # Extract model name from filename: bench-results-gpt-4o-mini.json -> gpt-4o-mini
            MODEL=$(basename "$f" .json | sed 's/bench-results-//' | tr '-' '.' | sed 's/gpt\.4o\.mini/gpt-4o-mini/' | sed 's/gpt\.5\.5/gpt-5.5/')
            INPUTS="$INPUTS $f:$MODEL"
          done
          if [ -z "$INPUTS" ]; then
            echo "No result files found."
            exit 0
          fi
          python scripts/govern_bench/compare_runs.py \
            $INPUTS \
            --tasks T1 T6 T7 T10 T11 T13 \
            --output docs/site/model-comparison.md
          cat docs/site/model-comparison.md

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: bench-comparison-${{ github.run_id }}
          path: docs/site/model-comparison.md
          retention-days: 30

      - name: Post comparison summary
        if: always()
        run: |
          echo "## Model Comparison Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tasks:** ${{ github.event.inputs.tasks || 'T1,T2,T6,T7,T10,T11,T13' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reps:** ${{ github.event.inputs.reps || '2' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Models:** gpt-4o-mini vs gpt-5.5" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/site/model-comparison.md ]; then
            python -c "import re,pathlib; c=pathlib.Path('docs/site/model-comparison.md').read_text(); m=re.search(r'## Headline findings.*',c,re.DOTALL); print(m.group()[:2000]) if m else None" >> "$GITHUB_STEP_SUMMARY"
          fi
