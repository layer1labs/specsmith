name: Governance Efficiency Benchmark

on:
  push:
    branches: [develop]
    paths:
      - "scripts/govern_bench/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "scripts/govern_bench/**"
  workflow_dispatch:
    inputs:
      groups:
        description: "Model groups to run (comma-separated: open,open-qwen,open-frontier,open-direct,openai,anthropic,google). Default: open."
        required: false
        default: "open"
      providers:
        description: "Restrict to providers (comma-separated). Blank = all in the selected groups."
        required: false
        default: ""
      tiers:
        description: "Restrict to size tiers (e.g. open-small,open-xl). Blank = all."
        required: false
        default: ""
      models:
        description: "Restrict to specific models by label or exact id (comma-separated). Blank = all."
        required: false
        default: ""
      tasks:
        description: "Task IDs (comma-separated). Blank = all."
        required: false
        default: "T1,T2,T6,T7,T10,T11,T13"
      conditions:
        description: "Condition IDs (comma-separated). Blank = all 12."
        required: false
        default: ""
      reps:
        description: "Repetitions per cell (2 = cost run; 5 = publication)"
        required: false
        default: "5"
      dry_run:
        description: "Dry-run mode — no real API calls, deterministic dummy data"
        required: false
        type: boolean
        default: false
      probe_only:
        description: "Validate exact model access, billing, and tool calls without starting the matrix"
        required: false
        type: boolean
        default: false

permissions: {}

env:
  SPECSMITH_NO_AUTO_UPDATE: "1"
  SPECSMITH_PYPI_CHECKED: "1"
  SPECSMITH_ALLOW_NON_PIPX: "1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # smoke — always runs on push/PR in dry-run mode.
  # Validates the harness loads, the selector works, and --list works.
  # ──────────────────────────────────────────────────────────────────────────
  smoke:
    name: Benchmark smoke test (dry-run)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Verify task registry loads
        run: python scripts/govern_bench/run_bench.py --list

      - name: Verify model selector (open + open-direct groups)
        run: |
          python scripts/govern_bench/select_models.py --groups open --pretty
          python scripts/govern_bench/select_models.py --groups open-qwen --pretty
          python scripts/govern_bench/select_models.py --groups open-frontier --pretty
          python scripts/govern_bench/select_models.py --groups open-direct --pretty

      - name: Verify demo-dependency provisioning + test collection
        run: |
          python scripts/govern_bench/install_demo_deps.py
          # Mirror the grader (harness.py): run pytest from each project root with
          # PYTHONPATH=project root so first-party packages (e.g. `pipeline`) import.
          for d in scripts/govern_bench/projects/*/; do
            set +e
            ( cd "$d" && PYTHONPATH="$PWD" python -m pytest --collect-only -q . )
            rc=$?
            set -e
            if [ "$rc" -ne 0 ] && [ "$rc" -ne 5 ]; then
              echo "::error::pytest collection failed in $d (rc=$rc)"
              exit 1
            fi
          done

      - name: Dry-run benchmark — OpenAI (core + long horizon)
        env:
          BENCH_DRY_RUN: "1"
        run: |
          python scripts/govern_bench/run_bench.py \
            --task T6 --task T7 --task T10 --task T11 --task T13 --task T28 \
            --provider openai --model gpt-4o-mini \
            --reps 2 \
            --output /tmp/bench-smoke-openai.md \
            --json-output /tmp/bench-smoke-openai.json

      - name: Dry-run benchmark — HuggingFace (T6, T7)
        env:
          BENCH_DRY_RUN: "1"
        run: |
          python scripts/govern_bench/run_bench.py \
            --task T6 --task T7 \
            --provider huggingface --model Qwen/Qwen3.6-35B-A3B:deepinfra \
            --reps 2 \
            --output /tmp/bench-smoke-hf.md \
            --json-output /tmp/bench-smoke-hf.json

      - name: Upload smoke report
        uses: actions/upload-artifact@v7
        with:
          name: bench-smoke-report
          path: |
            /tmp/bench-smoke-openai.md
            /tmp/bench-smoke-openai.json
            /tmp/bench-smoke-openai.audit.json
            /tmp/bench-smoke-hf.md
            /tmp/bench-smoke-hf.json
            /tmp/bench-smoke-hf.audit.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # setup — build the run matrix from models.yml (toggleable groups/tiers) and
  # gate the run behind exact model-access and live tool-call probes.
  # ──────────────────────────────────────────────────────────────────────────
  setup:
    name: Select models + probe availability
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install selector dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate run matrix from models.yml
        id: gen
        run: |
          MATRIX=$(python scripts/govern_bench/select_models.py \
            --groups "${{ github.event.inputs.groups }}" \
            --providers "${{ github.event.inputs.providers }}" \
            --tiers "${{ github.event.inputs.tiers }}" \
            --models "${{ github.event.inputs.models }}")
          echo "Selected matrix: $MATRIX"
          echo "$MATRIX" > matrix.json
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Probe model access, credits, and tool-call compatibility
        if: github.event.inputs.dry_run != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BENCH_OPENAI_COMPAT_API_KEY: ${{ secrets.BENCH_OPENAI_COMPAT_API_KEY }}
          BENCH_OPENAI_BASE_URL: ${{ vars.BENCH_OPENAI_BASE_URL || 'https://openrouter.ai/api/v1' }}
        run: python scripts/govern_bench/probe_models.py --matrix matrix.json --live-call

  # ──────────────────────────────────────────────────────────────────────────
  # bench-matrix — one job per selected model. No continue-on-error: a model
  # that errors every cell (or lacks its secret) fails loudly.
  # ──────────────────────────────────────────────────────────────────────────
  bench-matrix:
    name: "Bench [${{ matrix.tier }}] ${{ matrix.label }}"
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.probe_only != 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml click

      - name: Install provider SDK
        run: |
          case "${{ matrix.provider }}" in
            openai)        pip install openai ;;
            openai-compat) pip install openai ;;  # direct OpenAI-compatible host (e.g. OpenRouter)
            anthropic)     pip install anthropic ;;
            google)        pip install google-generativeai ;;
            huggingface)   pip install openai ;;  # HF router is OpenAI-compatible
          esac

      - name: Install demo-project dependencies (grader integrity)
        run: python scripts/govern_bench/install_demo_deps.py

      - name: Sanity-check demo test collection
        run: |
          # Mirror the grader (harness.py): run pytest from each project root with
          # PYTHONPATH=project root so first-party packages (e.g. `pipeline`) import.
          for d in scripts/govern_bench/projects/*/; do
            set +e
            ( cd "$d" && PYTHONPATH="$PWD" python -m pytest --collect-only -q . )
            rc=$?
            set -e
            if [ "$rc" -ne 0 ] && [ "$rc" -ne 5 ]; then
              echo "::error::pytest collection failed in $d (rc=$rc)"
              exit 1
            fi
          done

      - name: Check API key available
        id: key_check
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          BENCH_OPENAI_COMPAT_API_KEY: ${{ secrets.BENCH_OPENAI_COMPAT_API_KEY }}
        run: |
          case "${{ matrix.provider }}" in
            openai)        KEY="$OPENAI_API_KEY" ;;
            openai-compat) KEY="$BENCH_OPENAI_COMPAT_API_KEY" ;;
            anthropic)     KEY="$ANTHROPIC_API_KEY" ;;
            google)        KEY="$GOOGLE_API_KEY" ;;
            huggingface)   KEY="$HF_TOKEN" ;;
            *)             KEY="" ;;
          esac
          if [ -z "$KEY" ]; then
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              echo "Dry-run: missing secret for ${{ matrix.provider }} is acceptable."
            else
              echo "::error::Missing secret for ${{ matrix.provider }} (${{ matrix.model }}); configure it or deselect this group."
              exit 1
            fi
          fi

      - name: Build task/condition arguments
        id: build-args
        run: |
          ARGS=""
          IFS=',' read -ra TASKS <<< "${{ github.event.inputs.tasks }}"
          for t in "${TASKS[@]}"; do
            t=$(echo "$t" | xargs)
            [ -n "$t" ] && ARGS="$ARGS --task $t"
          done
          IFS=',' read -ra CONDS <<< "${{ github.event.inputs.conditions }}"
          for c in "${CONDS[@]}"; do
            c=$(echo "$c" | xargs)
            [ -n "$c" ] && ARGS="$ARGS --condition $c"
          done
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: "Run benchmark — ${{ matrix.label }} (${{ matrix.provider }}/${{ matrix.model }})"
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          BENCH_OPENAI_COMPAT_API_KEY: ${{ secrets.BENCH_OPENAI_COMPAT_API_KEY }}
          BENCH_OPENAI_BASE_URL:       ${{ vars.BENCH_OPENAI_BASE_URL || 'https://openrouter.ai/api/v1' }}
          BENCH_DRY_RUN:     ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          BENCH_MAX_TURNS:   "12"
        run: |
          DRY_FLAG=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && DRY_FLAG="--dry-run"
          python scripts/govern_bench/run_bench.py \
            ${{ steps.build-args.outputs.args }} \
            --reps ${{ github.event.inputs.reps || '5' }} \
            --provider ${{ matrix.provider }} \
            --model "${{ matrix.model }}" \
            --output   "bench-report-${{ matrix.label }}.md" \
            --json-output "bench-results-${{ matrix.label }}.json" \
            $DRY_FLAG

      - name: Upload per-model artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-${{ matrix.label }}-${{ github.run_id }}
          path: |
            bench-report-${{ matrix.label }}.md
            bench-results-${{ matrix.label }}.json
            bench-results-${{ matrix.label }}.audit.json
          retention-days: 30
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # compare — collect every per-model artifact and build a unified report.
  # Model labels are read from each JSON's "model" field, so no name mangling.
  # ──────────────────────────────────────────────────────────────────────────
  compare:
    name: Cross-model comparison
    runs-on: ubuntu-latest
    needs: bench-matrix
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.probe_only != 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Download all per-model artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bench-*-${{ github.run_id }}
          merge-multiple: true
          path: results/

      - name: Generate unified comparison report
        env:
          PYTHONPATH: scripts
        run: |
          shopt -s nullglob
          FILES=()
          for file in results/bench-results-*.json; do
            [[ "$file" == *.audit.json ]] || FILES+=("$file")
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No result files found — all model jobs may have failed or been skipped."
            exit 1
          fi
          echo "Comparing ${#FILES[@]} result file(s): ${FILES[*]}"
          python scripts/govern_bench/compare_runs.py \
            "${FILES[@]}" \
            --output docs/site/model-comparison.md
          cat docs/site/model-comparison.md

      - name: Upload comparison report
        uses: actions/upload-artifact@v7
        with:
          name: bench-comparison-${{ github.run_id }}
          path: docs/site/model-comparison.md
          retention-days: 30
          if-no-files-found: ignore

      - name: Post summary
        if: always()
        run: |
          {
            echo "## GovernanceBench — Model Comparison"
            echo ""
            echo "- Groups: ${{ github.event.inputs.groups || 'open' }}"
            echo "- Tasks: ${{ github.event.inputs.tasks || 'T1,T2,T6,T7,T10,T11,T13' }}"
            echo "- Reps: ${{ github.event.inputs.reps || '5' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/site/model-comparison.md ]; then
            python -c "import re,pathlib; c=pathlib.Path('docs/site/model-comparison.md').read_text(); m=re.search(r'## Headline findings.*',c,re.DOTALL); print(m.group()[:3000] if m else '')" >> "$GITHUB_STEP_SUMMARY"
          fi
