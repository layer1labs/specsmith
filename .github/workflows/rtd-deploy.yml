name: Deploy ReadTheDocs

# Triggered manually AFTER:
#   1. Benchmark results are complete
#   2. docs/ is updated with benchmark data (model-comparison.md, hf_card.md, etc.)
#   3. A release has already been published to PyPI
#
# Do NOT trigger this on every release — benchmarks must be included first.

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag to reference (e.g. v0.19.2). Informational only."
        required: false
        default: ""
      build_stable:
        description: "Build RTD 'stable' version (latest tag)"
        required: false
        type: boolean
        default: true
      build_latest:
        description: "Build RTD 'latest' version (main branch)"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  rtd-deploy:
    name: Trigger ReadTheDocs builds
    runs-on: ubuntu-latest
    steps:
      - name: Log deploy intent
        run: |
          echo "RTD deploy triggered for: ${{ github.event.inputs.version_tag || '(no tag specified)' }}"
          echo "Build stable: ${{ github.event.inputs.build_stable }}"
          echo "Build latest: ${{ github.event.inputs.build_latest }}"

      - name: Check RTD_TOKEN
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          if [ -z "$RTD_TOKEN" ]; then
            echo "::error::RTD_TOKEN secret not set — cannot trigger RTD."
            exit 1
          fi
          echo "RTD_TOKEN present."

      - name: Configure RTD project source
        if: github.event.inputs.build_stable == 'true' || github.event.inputs.build_latest == 'true'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          PROJECT_STATUS=$(curl -sS -o /tmp/rtd-project.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Token $RTD_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/layer1labs/specsmith","type":"git"},"default_branch":"main","homepage":"https://github.com/layer1labs/specsmith"}' \
            "https://readthedocs.org/api/v3/projects/specsmith/")
          echo "RTD project update: HTTP $PROJECT_STATUS"
          cat /tmp/rtd-project.json
          [ "$PROJECT_STATUS" = "204" ] || { echo "::error::RTD project update failed."; exit 1; }

          PROJECT_STATE_STATUS=$(curl -sS -o /tmp/rtd-project-state.json -w "%{http_code}" \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://readthedocs.org/api/v3/projects/specsmith/")
          [ "$PROJECT_STATE_STATUS" = "200" ] || { echo "::error::RTD project verification failed with HTTP $PROJECT_STATE_STATUS."; cat /tmp/rtd-project-state.json; exit 1; }
          PROJECT_REPOSITORY=$(python -c "import json; print(json.load(open('/tmp/rtd-project-state.json'))['repository']['url'])")
          PROJECT_BRANCH=$(python -c "import json; print(json.load(open('/tmp/rtd-project-state.json'))['default_branch'])")
          case "$PROJECT_REPOSITORY" in
            https://github.com/layer1labs/specsmith|https://github.com/layer1labs/specsmith.git) ;;
            *) echo "::error::RTD project repository is '$PROJECT_REPOSITORY', not layer1labs/specsmith."; exit 1 ;;
          esac
          [ "$PROJECT_BRANCH" = "main" ] || { echo "::error::RTD project default branch is '$PROJECT_BRANCH', not main."; exit 1; }

          SYNC_STATUS=$(curl -sS -o /tmp/rtd-sync.json -w "%{http_code}" -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://readthedocs.org/api/v3/projects/specsmith/sync-versions/")
          echo "RTD version sync: HTTP $SYNC_STATUS"
          cat /tmp/rtd-sync.json
          [ "$SYNC_STATUS" = "202" ] || { echo "::error::RTD version sync failed."; exit 1; }

      - name: Trigger RTD stable build
        if: github.event.inputs.build_stable == 'true'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/rtd-stable.json -w "%{http_code}" -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://readthedocs.org/api/v3/projects/specsmith/versions/stable/builds/")
          echo "RTD stable build trigger: HTTP $STATUS"
          cat /tmp/rtd-stable.json
          [ "$STATUS" = "202" ] || { echo "::error::RTD stable build trigger failed."; exit 1; }

      - name: Verify RTD latest tracks main
        if: github.event.inputs.build_latest == 'true'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          for attempt in {1..12}; do
            LATEST_STATUS=$(curl -sS -o /tmp/rtd-latest.json -w "%{http_code}" \
              -H "Authorization: Token $RTD_TOKEN" \
              "https://readthedocs.org/api/v3/projects/specsmith/versions/latest/")
            [ "$LATEST_STATUS" = "200" ] || { echo "::error::RTD latest lookup failed with HTTP $LATEST_STATUS."; cat /tmp/rtd-latest.json; exit 1; }
            LATEST_IDENTIFIER=$(python -c "import json; print(json.load(open('/tmp/rtd-latest.json'))['identifier'])")
            if [ "$LATEST_IDENTIFIER" = "main" ]; then
              echo "RTD latest now tracks main."
              exit 0
            fi
            echo "RTD latest is '$LATEST_IDENTIFIER'; waiting for version sync ($attempt/12)."
            sleep 5
          done
          echo "::error::RTD latest did not switch to main after version sync."
          cat /tmp/rtd-latest.json
          exit 1

      - name: Trigger RTD latest build
        if: github.event.inputs.build_latest == 'true'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/rtd-latest.json -w "%{http_code}" -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://readthedocs.org/api/v3/projects/specsmith/versions/latest/builds/")
          echo "RTD latest build trigger: HTTP $STATUS"
          cat /tmp/rtd-latest.json
          [ "$STATUS" = "202" ] || { echo "::error::RTD latest build trigger failed."; exit 1; }

      - name: Summary
        if: always()
        run: |
          echo "## RTD Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ github.event.inputs.version_tag || 'N/A' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stable build | ${{ github.event.inputs.build_stable }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest build | ${{ github.event.inputs.build_latest }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered at | $(date -u) |" >> "$GITHUB_STEP_SUMMARY"
