name: Dev Release

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy src/specsmith/
      - run: pytest tests/ -x -q

  dev-build:
    needs: quality
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build
      - name: Set development version
        shell: bash
        run: |
          BASE_VERSION=$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Development builds require a final base version, got $BASE_VERSION"
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count "$TAG..HEAD")
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          DEV_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}.dev${COMMIT_COUNT}"
          python -c 'from pathlib import Path; import sys; path = Path("pyproject.toml"); text = path.read_text(encoding="utf-8"); path.write_text(text.replace(f"version = {sys.argv[1]!r}", f"version = {sys.argv[2]!r}", 1), encoding="utf-8")' "$BASE_VERSION" "$DEV_VERSION"
          PYTHONPATH=src python scripts/check_dev_release.py --expected-version "$DEV_VERSION"
          echo "DEV_VERSION=$DEV_VERSION" >> "$GITHUB_ENV"
      - run: python -m build
      - name: Upload development artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-dist
          path: dist/

  pypi-dev-publish:
    needs: dev-build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dev-dist
          path: dist/
      - name: Publish development release to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
