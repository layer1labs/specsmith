name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  security-events: read  # needed for code scanning alert API

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      # types-pyyaml covers yaml stubs; --disable-error-code import-untyped
      # suppresses the remaining 'Library stubs not installed' warnings for
      # packages that mypy can still use (like yaml) even without stub files.
      - run: pip install types-pyyaml
      - run: mypy src/specsmith --ignore-missing-imports --disable-error-code import-untyped
      - run: pytest tests/ -x -q

  code-scan-gate:
    # Block the release if any High or Critical code scanning alerts are open.
    # All alerts MUST be resolved before PyPI or RTD receives the release.
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - name: Check for open High/Critical code scanning alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh api \
            "repos/${{ github.repository }}/code-scanning/alerts?state=open&per_page=100" \
            --jq '[.[] | select(
              .rule.security_severity_level == "critical" or
              .rule.security_severity_level == "high"
            )] | length')
          echo "Open High/Critical code scanning alerts: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Release blocked — $COUNT open High/Critical code scanning alert(s). Resolve all alerts before deploying."
            exit 1
          fi
          echo "Code scanning gate passed — no High/Critical alerts open."

  build:
    needs: [test, code-scan-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build
      - name: Strip git-URL deps before PyPI build
        run: |
          # PyPI rejects packages with direct git+https:// dependencies.
          # chronomemory is now on PyPI (>=0.2.7); this step is a no-op for the current
          # version spec but is kept in case a git-URL dep is reintroduced.
          sed -i '/chronomemory @ git+/d' pyproject.toml
      - run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # NOTE: during the dev phase no stable tag has been pushed, so this
          # step will not run. When the first official stable release ships:
          #   1. Remove the 'prerelease: false' note below (GitHub will mark it
          #      as the latest stable release by default).
          #   2. Change kairos_updater.rs KairosUpdateChannel::default() -> Stable.
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes || echo "Release already exists — skipping"

  pypi-publish:
    needs: [build, code-scan-gate]
    runs-on: ubuntu-latest
    # 'pypi' environment matches the Trusted Publisher configured on PyPI
    # (layer1labs/specsmith, release.yml, environment: pypi).
    # The code-scan-gate job above ALSO blocks this if any High/Critical alerts exist.
    # Only publish from main branch tags — never from develop or feature branches.
    environment: pypi
    permissions:
      id-token: write
    if: github.event.base_ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  cleanup-dev-releases:
    # After a stable release lands on PyPI, scrub all .devN pre-release builds
    # for the same base version (e.g. 0.15.2.dev554 … 0.15.2.dev562 when
    # v0.15.2 ships).  Also wipes the rolling latest-dev GitHub pre-release.
    # Requires PYPI_API_TOKEN repo secret (project-scoped PyPI token with
    # delete permission — separate from the OIDC upload token).
    needs: [pypi-publish]
    runs-on: ubuntu-latest
    continue-on-error: true   # never block the release on cleanup failures
    steps:
      - name: Delete dev PyPI builds for this base version
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          BASE_VERSION: ${{ github.ref_name }}
        run: |
          pip install requests --quiet

          python3 - <<'PYEOF'
          import json, os, sys, re
          import urllib.request
          import requests

          token = os.environ.get("PYPI_API_TOKEN", "")
          if not token:
              print("PYPI_API_TOKEN not set — skipping PyPI dev cleanup.")
              sys.exit(0)

          pkg = "specsmith"
          tag = os.environ["BASE_VERSION"]          # e.g. 'v0.15.2'
          base = tag.lstrip("v")                    # e.g. '0.15.2'

          with urllib.request.urlopen(f"https://pypi.org/pypi/{pkg}/json") as r:
              all_versions = list(json.loads(r.read())["releases"].keys())

          dev_versions = [v for v in all_versions if v.startswith(f"{base}.dev")]
          if not dev_versions:
              print(f"No dev releases found for {base} — nothing to do.")
              sys.exit(0)

          print(f"Deleting {len(dev_versions)} dev release(s): {dev_versions}")
          for version in dev_versions:
              resp = requests.post(
                  "https://upload.pypi.org/legacy/",
                  data={":action": "remove_pkg", "name": pkg, "version": version},
                  auth=("__token__", token),
              )
              result = "deleted" if resp.status_code in (200, 204) else f"status {resp.status_code}"
              print(f"  {pkg}/{version}: {result}")
          PYEOF

      - name: Delete latest-dev GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-dev --repo ${{ github.repository }} \
            --yes --cleanup-tag 2>/dev/null \
            && echo "Deleted latest-dev pre-release." \
            || echo "latest-dev not found — skipping."

  rtd-publish:
    # RTD publish is DISABLED in the automated release workflow.
    # Trigger manually via .github/workflows/rtd-deploy.yml AFTER benchmark
    # results are complete and docs have been updated with the latest results.
    needs: [pypi-publish, code-scan-gate]
    runs-on: ubuntu-latest
    continue-on-error: true
    if: false  # manual trigger only — use rtd-deploy.yml workflow
    steps:
      - name: Trigger ReadTheDocs stable build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          if [ -z "$RTD_TOKEN" ]; then
            echo "WARNING: RTD_TOKEN not set — skipping RTD trigger."
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          echo "Triggering RTD builds for tag ${TAG}..."

          # 1. Trigger the 'stable' version build (auto-tracked from latest tag)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://readthedocs.org/api/v3/projects/specsmith/versions/stable/builds/")
          echo "RTD stable build trigger: HTTP $STATUS"

          # 2. Point 'latest' at main so it tracks the stable release
          curl -s -o /dev/null -X PATCH \
            -H "Authorization: Token $RTD_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"identifier": "main", "active": true}' \
            "https://readthedocs.org/api/v3/projects/specsmith/versions/latest/"

          # 3. Trigger a fresh 'latest' build (now tracking main)
          LATEST=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://readthedocs.org/api/v3/projects/specsmith/versions/latest/builds/")
          echo "RTD latest build trigger: HTTP $LATEST"
