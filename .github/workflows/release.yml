name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      # types-pyyaml covers yaml stubs; --disable-error-code import-untyped
      # suppresses the remaining 'Library stubs not installed' warnings for
      # packages that mypy can still use (like yaml) even without stub files.
      - run: pip install types-pyyaml
      - run: mypy src/specsmith --ignore-missing-imports --disable-error-code import-untyped
      - run: pytest tests/ -x -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build
      - run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # NOTE: using --no-latest during the dev/pre-release phase so that the
          # rolling dev pre-release stays as the visible "latest" on GitHub.
          # FIRST STABLE RELEASE: change --no-latest to --latest here, and also
          # update kairos_updater.rs default channel back to Stable.
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --no-latest || echo "Release already exists — skipping"

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # Only publish from main branch tags — never from develop or feature branches
    if: github.event.base_ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
