name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Default: deny all permissions. Each job grants only what it needs.
permissions: {}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install ruff
      - name: ruff format --check
        run: ruff format --check src/ tests/
      - name: ruff check
        run: ruff check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: mypy src/specsmith/

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest --cov=specsmith --cov-report=term-missing

  security:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit --ignore-vuln CVE-2026-3219

  sync-check:
    # REQ-003 guard: fail CI if .specsmith/ JSON drifts from docs/ Markdown.
    name: Sync check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Check machine state sync
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith sync --check --project-dir .

  validate-strict:
    # YAML governance schema guard: duplicate IDs, orphan tests, missing fields.
    name: Validate strict
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Strict governance schema validation
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith validate --strict --json --project-dir .

  docs-build:
    # H23/H24 guard: mkdocs build --strict fails on any doc warning.
    name: Docs build (mkdocs --strict)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs]"
      - name: Build docs (strict)
        run: mkdocs build --strict

  api-surface:
    # REQ-140 guard: regenerates the public CLI surface and fails the build
    # if the live output drifts from the committed fixture.
    name: API surface
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Regenerate api_surface.json
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
          PYTHONIOENCODING: utf-8
        run: |
          python -m specsmith.cli api-surface > /tmp/api_surface.live.json
      - name: Diff against committed fixture
        run: |
          diff -u tests/fixtures/api_surface.json /tmp/api_surface.live.json || {
            echo "::error::api_surface.json is stale. Regenerate via:"
            echo "  python -m specsmith.cli api-surface > tests/fixtures/api_surface.json"
            exit 1
          }
