name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Default: deny all permissions. Each job grants only what it needs.
permissions: {}

env:
  SPECSMITH_ALLOW_NON_PIPX: "1"
  SPECSMITH_NO_AUTO_UPDATE: "1"
  SPECSMITH_PYPI_CHECKED: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install ruff
      - name: ruff format --check
        run: ruff format --check src/ tests/
      - name: ruff check
        run: ruff check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: mypy src/specsmith/

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run tests with machine-readable evidence
        run: >-
          python -m pytest --cov=specsmith --cov-report=term-missing
          --junitxml=test-results/pytest-${{ matrix.os }}-py${{ matrix.python-version }}.xml
      - name: Archive test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-evidence-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results/*.xml
          if-no-files-found: error

  wheel-smoke:
    # The full test matrix above covers Python 3.11 and 3.12 on all three
    # operating systems. This job additionally validates the exact wheel a
    # user installs, without shell activation or platform-specific venv paths.
    name: Candidate wheel smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python scripts/platform_smoke.py --wheel-dir dist

  security:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit --ignore-vuln CVE-2026-3219

  sync-check:
    # REQ-003 guard: fail CI if .specsmith/ JSON drifts from docs/ Markdown.
    name: Sync check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Check machine state sync
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith sync --check --project-dir .

  validate-strict:
    # YAML governance schema guard: duplicate IDs, orphan tests, missing fields.
    name: Validate strict
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Strict governance schema validation
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith validate --strict --json --project-dir .

  docs-build:
    # H23/H24 guard: mkdocs build --strict fails on any doc warning.
    name: Docs build (mkdocs --strict)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs]"
      - name: Build docs (strict)
        run: mkdocs build --strict

  esdb-backends:
    # REQ-365 + REQ-366 guard: both ESDB backends must work on every push.
    # SQLite path: default, no license, no extra deps.
    # ChronoStore path: specsmith[esdb] installed + CI debug license from secret.
    name: ESDB backends (SQLite + ChronoStore)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SPECSMITH_ALLOW_NON_PIPX: "1"
      SPECSMITH_NO_AUTO_UPDATE: "1"
      SPECSMITH_PYPI_CHECKED: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install --upgrade pip

      # ── SQLite path (default, no license, no chronomemory) ──────────────
      - name: Install specsmith (core only — SQLite default)
        run: pip install -e ".[dev]"

      - name: "[SQLite] esdb status returns sqlite backend"
        env:
          SPECSMITH_ESDB_BACKEND: sqlite
        run: |
          OUT=$(python -m specsmith esdb status --json)
          echo "$OUT"
          echo "$OUT" | python -c "import json,sys; d=json.load(sys.stdin); exit(0 if d['backend']=='sqlite' else 1)"

      - name: "[SQLite] SqliteStore unit tests"
        env:
          SPECSMITH_ESDB_BACKEND: sqlite
        run: pytest tests/test_esdb_sqlite.py -v --tb=short

      - name: "[SQLite] License gate tests (no chronomemory installed)"
        env:
          SPECSMITH_ESDB_BACKEND: sqlite
        run: pytest tests/test_esdb_license.py -v --tb=short

      # ── ChronoStore path (specsmith[esdb] + CI debug license) ───────────
      - name: Install specsmith[esdb] (chronomemory from PyPI)
        run: pip install -e ".[esdb]"

      - name: Write CI debug license key from secret
        env:
          SPECSMITH_ESDB_CI_KEY_B64: ${{ secrets.SPECSMITH_ESDB_CI_KEY }}
        run: |
          mkdir -p "$HOME/.specsmith"
          python - <<'PYEOF'
          import base64, os
          raw = base64.b64decode(os.environ['SPECSMITH_ESDB_CI_KEY_B64'])
          path = os.path.expanduser('~/.specsmith/esdb.key')
          open(path, 'wb').write(raw)
          print(f'License written to {path}')
          PYEOF

      - name: "[ChronoStore] Verify CI license key is valid"
        run: |
          python -c "
          import sys, os
          from specsmith.esdb._license import verify_license_file
          s = verify_license_file(os.path.expanduser('~/.specsmith/esdb.key'))
          print(f'valid={s.valid} customer={s.customer}')
          sys.exit(0 if s.valid else 1)
          "

      - name: "[ChronoStore] esdb status returns chronomemory backend"
        run: |
          OUT=$(python -m specsmith esdb status --json)
          echo "$OUT"
          echo "$OUT" | python -c "import json,sys; d=json.load(sys.stdin); exit(0 if d['backend']=='chronomemory' and d['license']['active'] else 1)"

      - name: "[ChronoStore] esdb migrate into ChronoStore"
        run: |
          OUT=$(python -m specsmith esdb migrate --json)
          echo "$OUT"
          echo "$OUT" | python -c "import json,sys; d=json.load(sys.stdin); exit(0 if d.get('ok') else 1)"

      - name: "[ChronoStore] Full test suite with real chronomemory"
        run: pytest tests/test_esdb_license.py tests/test_esdb_sqlite.py -v --tb=short

      - name: Cleanup CI license key
        if: always()
        run: rm -f "$HOME/.specsmith/esdb.key"

  api-surface:
    # REQ-140 guard: regenerates the public CLI surface and fails the build
    # if the live output drifts from the committed fixture.
    name: API surface
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Regenerate api_surface.json
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
          PYTHONIOENCODING: utf-8
        run: |
            python -m specsmith api-surface > /tmp/api_surface.live.json
      - name: Diff against committed fixture
        run: |
          diff -u tests/fixtures/api_surface.json /tmp/api_surface.live.json || {
            echo "::error::api_surface.json is stale. Regenerate via:"
              echo "  python -m specsmith api-surface > tests/fixtures/api_surface.json"
            exit 1
          }
