rules:
  - id: H1
    name: Ledger required
    category: process
    description: No ledger entry = work not done.

  - id: H2
    name: Proposal required
    category: process
    description: No proposal = no execution.

  - id: H3
    name: Cross-platform awareness
    category: engineering
    description: All work must consider every target platform. Unsupported platforms must be stated.

  - id: H4
    name: Environment isolation
    category: engineering
    description: No system-dependent assumptions. Virtual environments required.

  - id: H5
    name: Explicit startup
    category: engineering
    description: No hidden service logic. All startup behavior must be documented and inspectable.

  - id: H6
    name: No silent scope expansion
    category: process
    description: If the task grows beyond the proposal, stop and re-propose.

  - id: H7
    name: No undocumented state changes
    category: auditability
    description: Every file creation, modification, or deletion must be traceable and recorded.

  - id: H8
    name: Documentation is implementation
    category: engineering
    description: Architecture-affecting changes MUST update relevant docs in the same work cycle.

  - id: H9
    name: Execution timeout required
    category: engineering
    description: All agent-invoked commands MUST have a timeout. No command may run indefinitely.

  - id: H10
    name: No hardcoded versions
    category: engineering
    description: Version strings MUST NOT be hardcoded. Use importlib.metadata.version() at runtime.

  - id: H11
    name: No unbounded loops
    category: engineering
    description: Every loop must have an explicit deadline or iteration cap.

  - id: H12
    name: Platform-aware automation
    category: engineering
    description: Use sh/bash on Unix/macOS; .cmd/.ps1 on Windows. Never assume a single platform.

  - id: H13
    name: Epistemic Boundaries Required
    category: epistemic
    description: All proposals MUST state their epistemic boundaries. Hidden assumptions are a stop condition.

  - id: H14
    name: Documentation freshness
    category: documentation
    description: Docs updated in same commit as code. Undocumented features are governance violations.

  # Anti-hallucination rules H15-H22 derived from OEA Recursive Generative Stability research
  # BitConcepts Research, 2026

  - id: H15
    name: Epistemic Scope Bounding
    category: anti_hallucination
    oea_control: epistemic_calibration
    description: Agent must not make claims outside verified knowledge. Respond with explicit uncertainty rather than fabricating.

  - id: H16
    name: Anti-Drift Recursion Guard
    category: anti_hallucination
    oea_control: recursion_guarding
    description: Max 5 autonomous generation steps before a human checkpoint. Unbound recursion is a stop condition.

  - id: H17
    name: Calibration Direction
    category: anti_hallucination
    oea_control: epistemic_calibration
    description: Express uncertainty proportional to evidence quality. False confidence is a harder failure than acknowledged uncertainty.

  - id: H18
    name: RAG Retrieval Filtering
    category: anti_hallucination
    oea_control: retrieval_filtering
    description: Retrieved context must pass relevance validation (similarity >= 0.6) before inclusion.

  - id: H19
    name: Synthetic Contamination Prevention
    category: anti_hallucination
    oea_control: data_provenance
    description: Synthetically generated data must not be silently mixed with real ground-truth data. Every record must carry source_type.

  - id: H20
    name: Falsifiability Required
    category: anti_hallucination
    oea_control: epistemic_calibration
    description: All factual agent claims must cite verifiable sources or be explicitly flagged as [HYPOTHESIS].

  - id: H21
    name: No Undisclosed Model Assumptions
    category: anti_hallucination
    oea_control: scope_bounding
    description: Context window size, instruction format, tool support, temperature, and provider/model version must be disclosed when they affect correctness.

  - id: H22
    name: Cross-Platform CI Enforcement
    category: ci_cd
    oea_control: infrastructure_validity
    description: CI must run on Linux/macOS AND Windows. Green on a single platform alone is not cross-platform coverage.
