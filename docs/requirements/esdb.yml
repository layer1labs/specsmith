- id: REQ-248
  title: Dev/Stable Update Channel Persistence
  description: specsmith MUST persist a user-chosen update channel (stable or dev)
    to ~/.specsmith/channel. specsmith channel set {stable|dev} writes the file; channel
    clear removes it. effective_channel_with_source() MUST return (channel, source)
    where source is user when the file exists, otherwise
  source: ARCHITECTURE.md [Update Channel Selection]
  status: implemented
