- id: REQ-252
  title: ESDB WAL Rollback Command
  description: 'specsmith esdb rollback [--steps N] [--json] MUST report the number
    of WAL events that would be undone. In stub mode (ChronoMemory native engine not
    linked) it MUST return {ok: true, steps_requested: N, records_before: N, note:
    "..."} without modifying state.'
  source: ARCHITECTURE.md [ESDB Extended Management]
  status: implemented
- id: REQ-253
  title: ESDB WAL Compact Command
  description: 'specsmith esdb compact [--json] MUST request WAL compaction. In stub
    mode it MUST return {ok: true, backend: "...", records: N, note: "..."} without
    error.'
  source: ARCHITECTURE.md [ESDB Extended Management]
  status: implemented
- id: REQ-254
  title: Skills Deactivate Command
  description: "specsmith skills deactivate <skill-id> [--project-dir DIR] MUST set\
    \ \active: false in the skill's skill.json, return True on success, and exit non-zero\
    \ with an error message if the skill is not found."
  source: ARCHITECTURE.md [AI Skills Builder]
  status: implemented
- id: REQ-255
  title: Skills Delete Command
  description: specsmith skills delete <skill-id> [--project-dir DIR] [--yes] MUST
    prompt for confirmation unless --yes is provided, then permanently remove the
    skill directory under .specsmith/skills/. Returns non-zero if the skill is not
    found.
  source: ARCHITECTURE.md [AI Skills Builder]
  status: implemented
