    console).
  status: implemented
  test_ids:
  - TEST-400
- id: REQ-393
  title: specsmith save emits a structured warning when uncommitted files remain after
    commit
  description: After the commit step in specsmith save, the command must check for
    remaining uncommitted changes via git status --porcelain. If any dirty files remain,
    a warning step is appended to the steps list with the list of affected files,
    the overall ok flag remains True (the warning does not block success), and the
    output includes a visible warning with the file paths so the user knows to investigate.
  status: implemented
  test_ids:
  - TEST-401
- id: REQ-394
  title: specsmith test suite must pass on all supported Python versions (3.10-3.13)
  status: planned
  description: CI matrix covers Python 3.10, 3.11, 3.12, 3.13. All tests must pass
    on every version, including tests that use optional packages (chronomemory, tomllib).
    Tests requiring unavailable optional packages must use sys.modules mocking or
    stdlib fallbacks rather than skip decorators.
