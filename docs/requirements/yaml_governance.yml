    routing table string.
  status: implemented
  test_ids:
  - TEST-396
- id: REQ-389
  title: AgentRunner integrates ModelRouter for seamless per-turn model switching
  description: AgentRunner loads .specsmith/local-models.yml on init and constructs
    a ModelRouter when multi-role config is present. On each turn, _handle_command
    calls ModelRouter.route() and temporarily sets SPECSMITH_OLLAMA_MODEL before calling
