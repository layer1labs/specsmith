  status: implemented
  test_ids:
  - TEST-397
- id: REQ-390
  title: specsmith run prints guided Ollama setup when no provider is available
  description: 'When specsmith run is invoked with no provider flags and no LLM provider
    is detected, the CLI prints step-by-step Ollama setup guidance: install URL, ollama
