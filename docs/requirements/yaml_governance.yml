  status: implemented
  test_ids:
  - TEST-392
- id: REQ-385
  title: LocalModelSelector detects hardware and returns best Ollama model; skips
    CPU-only
  description: detect_local_model() in local_model.py detects Apple Silicon (via sysctl
    hw.memsize) and NVIDIA GPUs (via nvidia-smi) and returns a LocalModelInfo with
