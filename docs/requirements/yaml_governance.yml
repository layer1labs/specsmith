  status: implemented
  test_ids:
  - TEST-395
- id: REQ-388
  title: ModelRouter classifies user intent and routes to the appropriate Ollama model
  description: specsmith.agent.model_router.classify_intent(text) classifies a user
    utterance as general, coding, or reasoning based on keyword matching and slash-command
    prefixes. ModelRouter.route(text) returns (model_tag, switched) where switched
