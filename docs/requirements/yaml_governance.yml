  status: implemented
  test_ids:
  - TEST-394
- id: REQ-387
  title: Multi-role local model detection returns general/coding/reasoning recommendations
  description: detect_local_models() in local_model.py returns a dict mapping ModelRole
    values (general, coding, reasoning) to LocalModelInfo instances selected for the
