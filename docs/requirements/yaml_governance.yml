  status: implemented
  test_ids:
  - TEST-399
- id: REQ-392
  title: esdb status --json must never emit bare Abort; stdout failure exits nonzero
  description: specsmith esdb status --json must write the JSON payload via sys.stdout.write
    to bypass Click's Windows console stream detection (which can raise click.exceptions.Abort).
