  status: implemented
  test_ids:
  - TEST-393
- id: REQ-386
  title: specsmith local-model detect/setup CLI exposes hardware-aware model recommendation
  description: specsmith local-model detect prints the recommended Ollama model tag,
    hardware tier, HF repo, and pull command for the current machine. specsmith local-model
    setup pulls the model via ensure_local_model(). Both commands support --json for
