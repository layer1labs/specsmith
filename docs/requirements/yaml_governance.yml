  source: plan 36bee5b6
  test_ids:
  - TEST-379
- id: REQ-378
  title: Scaffolded projects default to YAML-first governance mode
  status: implemented
  description: specsmith init (scaffold_project) MUST write .specsmith/governance-mode=yaml
    and create docs/requirements/core.yml + docs/tests/core.yml with starter entries
    so new projects are in YAML-first mode from day one. Legacy markdown-mode is only
