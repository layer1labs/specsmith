  status: implemented
  test_ids:
  - TEST-391
- id: REQ-384
  title: specsmith resume combines load and run in one command
  description: specsmith resume performs git pull, optional ESDB WAL restore (--from-backup),
    ESDB status report, then immediately starts the interactive AgentRunner session.
