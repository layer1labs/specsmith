  source: plan eadbed6a
  test_ids:
  - TEST-380
- id: REQ-379
  title: Auditor YAML dir checks are mode-aware
  status: implemented
  description: The yaml-requirements-dir and yaml-tests-dir auditor checks MUST only
    fail for projects in YAML-first mode (governance-mode=yaml). Legacy markdown-mode
    projects MUST pass these checks with an informational message, not a failure,
    to avoid breaking existing CI workflows during migration.
  source: plan eadbed6a
  test_ids:
  - TEST-381
- id: REQ-380
  title: session_init YAML-first requirement count reads requirements.json
  description: In YAML-first governance mode (.specsmith/governance-mode=yaml), session_init._count_requirements()
    reads .specsmith/requirements.json and .specsmith/testcases.json to determine
    total and covered requirement counts. It must NOT read the deprecated REQUIREMENTS.md
    or TESTS.md files.
  status: implemented
  test_ids:
  - TEST-388
- id: REQ-381
  title: BA interview project_type dimension pre-populated with auto-detected type
  description: The BA interview includes a project_type dimension as the first (10th
    overall) question. The hint is pre-populated with the inferred_type from scan_project_structure()
    so the user sees the auto-detected type and can confirm or refine it before the
    nine technical dimensions.
  status: implemented
  test_ids:
  - TEST-389
- id: REQ-382
  title: BA feature gap catalog maps ProjectType values to known specsmith gaps
  description: SPECSMITH_FEATURE_CATALOG maps ProjectType.value strings to lists of
    FeatureGap dataclasses describing known gaps in specsmith support for that project
