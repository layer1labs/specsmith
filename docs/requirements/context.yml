- id: REQ-244
  title: GPU-Aware Context Window Sizing
  description: 'Before starting an Ollama agent session, specsmith MUST detect available
    GPU VRAM (NVIDIA via nvidia-smi, AMD via rocm-smi) and recommend a num_ctx value.
    VRAM tiers: <6 GB → 4096, 6-12 GB → 8192, 12-20 GB → 16384, >=20 GB → 32768. CPU-only
    defaults to 4096. The function MUST never raise on any platform.'
  source: Plan 0ca40db4 [CTX-001]
  status: defined
- id: REQ-245
  title: Live Context Fill Indicator
  description: 'Every active agent conversation MUST track and emit context fill events
    with schema: {type: context_fill, used: int, limit: int, pct: float}. The fill
    percentage MUST be surfaced in the terminal UI as a compact progress bar (green
    0-60%, yellow 60-80%, orange 80-90%, red >90%).'
  source: Plan 0ca40db4 [CTX-002]
  status: defined
- id: REQ-246
  title: Auto Context Compression at Configurable Threshold
  description: When context fill reaches the configurable compression threshold (default
    80%, range 50-95%), specsmith MUST automatically trigger context summarization.
    Compression MUST emit a context_compressed event with before/after token counts.
    Auto-compression MUST be togglable; when off, only a warning is surfaced.
  source: Plan 0ca40db4 [CTX-003]
  status: defined
- id: REQ-247
  title: Hard Context Reservation — Never 100% Fill
  description: The context window MUST NEVER be allowed to reach 100% fill. A hard
    reservation of 15% (or MIN_FREE_TOKENS=2048, whichever is more restrictive) MUST
    remain free. When fill reaches the hard ceiling (default 85%), ContextFullError
    MUST be raised and emergency compression triggered regardless of the auto-compress
    toggle.
  source: Plan 0ca40db4 [CTX-004]
  status: defined
