# specsmith requirements — agent
# CANONICAL SOURCE: edit this file, not docs/REQUIREMENTS.md
# docs/REQUIREMENTS.md is regenerated from these YAML files.
#
# Schema: id (REQ-NNN), title, description, source, status
# Required fields: id, title, status
- id: REQ-065
  title: Nexus Runtime Must Not Own Governance
  description: The Nexus agent runtime must defer preflight, requirement mapping,
    verification, retry decisions, and ledger writing to Specsmith.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-066
  title: Nexus Must Provide Required Agent Roles
  description: Nexus must instantiate PlannerAgent, ShellAgent, CodeAgent, ReviewerAgent,
    MemoryAgent, GitAgent, HumanProxyAgent, and an Executor node.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-067
  title: Nexus Tool Layer Must Expose Required Tools
  description: Nexus must expose run_shell, read_file, write_file, patch_file, list_files,
    grep, git_diff, git_status, run_tests, open_url, search_docs, and remember_project_fact.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-068
  title: Nexus Safety Middleware Must Block Unsafe Commands
  description: The safety middleware must block or require explicit approval for unsafe
    shell patterns including rm -rf, git push, docker compose down -v, database migrations,
    deploy commands, and secret reads.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-069
  title: Nexus Tool Arguments Must Be JSON Validated
  description: All Nexus tool calls must validate that arguments are JSON-serializable
    before execution.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-070
  title: Nexus Must Normalize File Paths
  description: All file paths supplied to Nexus tools must be normalized to absolute,
    resolved paths before access.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-071
  title: Nexus Must Index the Repository
  description: Nexus must populate .repo-index/ with files.json, tags, test_commands.json,
    architecture.md, and conventions.md as available.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-072
  title: Nexus REPL Must Support Slash Commands
  description: The Nexus REPL must support /plan, /ask, /fix, /test, /commit, /pr,
    /undo, /context, /exit.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-073
  title: Nexus Output Contract
  description: Each Nexus task response must include sections Plan, Commands to run,
    Files changed, Diff, Test results, and Next action.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-074
  title: vLLM Image Must Be Pinned
  description: The Nexus docker-compose.yml must pin the vLLM image to a specific
    tag (vllm/vllm-openai:v0.8.5) and not use latest.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-075
  title: vLLM Must Serve l1-nexus Model
  description: The Nexus docker-compose.yml must publish the served model as l1-nexus
    and use the Hermes tool-call parser.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-076
  title: Nexus Tool Executor Registration Must Be Unique
  description: Each Nexus tool must be registered with the AG2 executor exactly once;
    LLM-side tool signatures may be attached to multiple caller agents but the execution
    function must not be re-registered to avoid AG2 override warnings.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-077
  title: Safe Cleanup Must Default to Dry-Run
  description: The Specsmith safe-cleanup capability must default to dry-run mode
    and only delete files when an explicit apply flag is provided.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-078
  title: Safe Cleanup Must Use a Hard-Coded Target List
  description: Safe cleanup must only consider the canonical built-in target list
    and must reject user-supplied arbitrary paths.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-079
  title: Safe Cleanup Must Protect Governance and Source
  description: Safe cleanup must refuse to delete .git, .specsmith, governance markdown
    files, pyproject.toml, README.md, LICENSE, CHANGELOG.md, src/, tests/, docs/,
    scripts/, .repo-index/, .github/, .vscode/, third-party agent integration directories
    (such as .agents/), and project configuration dotfiles.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-080
  title: Safe Cleanup Must Emit a Structured Report
  description: Safe cleanup must return a report containing the lists of removed paths,
    skipped paths with reasons, and total bytes reclaimed, suitable for inclusion
    as ledger evidence.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-081
  title: Safe Cleanup Must Be Exposed via Specsmith CLI
  description: The Specsmith CLI must expose the safe cleanup capability as `specsmith
    clean`, supporting `--apply`, `--json`, and `--project-dir`. When `--apply` is
    used and `LEDGER.md` exists, the run must be recorded as a `cleanup` ledger event
    tagged with REQ-077..REQ-080.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-082
  title: CLI Console Must Be UTF-8 Safe Across Platforms
  description: All Specsmith CLI output (rich Console) must render UTF-8 glyphs (such
    as warning, arrow, check, cross) without raising UnicodeEncodeError on Windows
    code pages such as cp1252. The console factory must reconfigure stdout/stderr
    to UTF-8 and disable rich's legacy_windows renderer.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-083
  title: Canonical Test Specification File Is TESTS.md
  description: The canonical test specification file is named `TESTS.md` (replacing
    the legacy names `TEST_SPEC.md`, `TEST-SPEC.md`, and `TEST-SPECS.md`). Specsmith
    code, governance documents, templates, scaffolder output, importer overlay, auditor
    checks, retrieval index, exporter, validator, REPL skill files, ReadTheDocs site,
    and CLI help must all reference `TESTS.md`. Legacy filenames must not be created
    by new scaffolds, must be auto-renamed by `specsmith migrate-project`, and must
    not be referenced in user-facing docs.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-084
  title: Natural-Language Governance Broker
  description: Specsmith must expose a Nexus broker module (`specsmith.agent.broker`)
    that translates plain-language user utterances into Specsmith-governed work without
    the user reasoning about REQ IDs, TEST IDs, or work items. The broker must classify
    intent (read-only ask vs change vs release), infer affected scope from the local
    `.repo-index` and existing requirements, invoke `specsmith preflight` and `specsmith
    verify` as the only sources of governance decisions, render plain-language plans
    and outcomes, hide REQ/TEST/work-item IDs by default (revealed only on `/why`,
    `/show-governance`, or `--verbose`), bound retries per REQ-014, escalate to a
    single user clarification on stop-and-align (REQ-063), and never invent governance
    content (REQ/TEST drafting requires explicit user confirmation).
  source: ARCHITECTURE.md
  status: defined
- id: REQ-085
  title: specsmith preflight CLI Subcommand
  description: The Specsmith CLI must expose a `specsmith preflight <utterance>` subcommand
    that reads `REQUIREMENTS.md` and `.specsmith/` state, classifies intent and infers
    scope, and emits a JSON object with at least the keys `decision` (one of `accepted`,
    `needs_clarification`, `blocked`, `rejected`), `work_item_id`, `requirement_ids`,
    `test_case_ids`, `confidence_target`, and `instruction`. Read-only asks accept
    by default, destructive intents require clarification, and changes with no matching
    scope return `needs_clarification` with a one-sentence question. The CLI must
    support `--project-dir`, `--json`, and `--verbose`.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-086
  title: Nexus REPL Must Gate Execution on Preflight Acceptance
  description: When a non-slash utterance flows through the broker, the Nexus REPL
    must only invoke the AG2 orchestrator's `run_task` if the preflight decision is
    `accepted`. For any other decision (`needs_clarification`, `blocked`, `rejected`),
    the REPL must print the broker's plain-language clarification or rejection and
    return to the prompt without executing.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-087
  title: Nexus REPL Must Drive Execution Through the Bounded-Retry Harness
  description: When the preflight decision is `accepted`, the Nexus REPL must drive
    the AG2 orchestrator through `specsmith.agent.broker.execute_with_governance`,
    supplying an executor that wraps `orchestrator.run_task` and synthesizes a result
    dict (`equilibrium`, `confidence`, `summary`). The harness must honor `DEFAULT_RETRY_BUDGET`
    (REQ-014), surface the single clarifying question on stop-and-align (REQ-063),
    and never call `run_task` directly outside the harness.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-088
  title: specsmith preflight Must Resolve Test Case IDs From Machine State
  description: The `specsmith preflight` CLI must populate `test_case_ids` in its
    JSON payload by joining the matched `requirement_ids` against `.specsmith/testcases.json`
    (or `TESTS.md` when the JSON is unavailable). When the resolved set is non-empty
    the CLI must include every matching `TEST-NNN` id and must never invent ids not
    present in machine state.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-089
  title: Nexus Live l1-nexus Smoke Test
  description: Specsmith must ship a `scripts/nexus_smoke.py` script that POSTs a
    minimal chat-completions request to a running vLLM `l1-nexus` container at `http://localhost:8000/v1/chat/completions`
    and reports whether the model responded with a well-formed `choices[0].message.content`.
    A pytest integration test must invoke the script and skip unless the environment
    variable `NEXUS_LIVE=1` is set, so the suite stays green offline but is verifiable
    when the container is up.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-090
  title: Nexus Documentation Must Describe Broker, Preflight, and Gated Execution
  description: '`ARCHITECTURE.md`, `README.md`, and `docs/` must describe the natural-language
    broker (REQ-084), the `specsmith preflight` CLI (REQ-085), the REPL execution
    gate (REQ-086), and the bounded-retry harness (REQ-087), including the `/why`
    toggle and an end-to-end example flow. Documentation must not surface REQ/TEST/WI
    tokens to the user except inside the explicit `/why` block.'
  source: ARCHITECTURE.md
  status: defined
- id: REQ-091
  title: Orchestrator Must Return a Structured TaskResult
  description: '`orchestrator.run_task` must return a `TaskResult` dataclass with
    at least the fields `equilibrium: bool`, `confidence: float`, `summary: str`,
    `files_changed: list[str]`, and `test_results: dict`. The Nexus REPL''s broker
    branch must consume this dataclass directly when feeding `execute_with_governance`
    (REQ-087); the broker must not synthesize `equilibrium` from a boolean cast of
    the summary string.'
  source: ARCHITECTURE.md
  status: defined
- id: REQ-092
  title: specsmith preflight CLI Must Use Decision-Specific Exit Codes
  description: The `specsmith preflight` CLI must exit `0` for `accepted`, `2` for
    `needs_clarification`, and `3` for `blocked` or `rejected` decisions, so CI pipelines
    and shell wrappers can branch on intent without parsing the JSON payload. The
    JSON payload must continue to print on stdout for both success and non-zero exits.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-093
  title: Accepted preflight Must Record a Ledger Event
  description: When `specsmith preflight` produces an `accepted` decision and `LEDGER.md`
    exists in the project root, the CLI must append a `preflight` ledger event tagged
    with `REQ-085` plus the resolved `requirement_ids`. The event must record the
    utterance, the assigned `work_item_id`, and the `confidence_target`, so every
    accepted preflight is traceable end-to-end.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-094
  title: /why Must Surface Post-Run Governance in the REPL
  description: When `verbose_governance` is on (toggled by `/why` or `/show-governance`),
    after the REPL drives `execute_with_governance` for an accepted utterance it must
    print a single `[/why]` block summarizing the assigned `work_item_id`, the matched
    `requirement_ids` and `test_case_ids`, the post-run confidence, and whether the
    bounded-retry harness reached equilibrium. When verbose mode is off, the post-run
    governance block must not be emitted.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-095
  title: Nexus Live Smoke Run Must Be Reproducible Evidence
  description: A live or honestly-skipped invocation of `scripts/nexus_smoke.py` must
    be captured under `.specsmith/runs/WI-NEXUS-011/logs.txt` so the project ledger
    preserves at least one reproducible record of the broker -> preflight -> orchestrator
    -> vLLM end-to-end path (or a documented reason the live container could not be
    reached in the current environment).
  source: ARCHITECTURE.md
  status: defined
- id: REQ-096
  title: Bounded-Retry Harness Must Map Failures to Retry Strategies
  description: 'When `execute_with_governance` exhausts its retry budget (REQ-014),
    it must classify the last executor report against the canonical retry strategy
    mapping (REQ-028): `narrow_scope`, `expand_scope`, `fix_tests`, `rollback`, or
    `stop`. The classification must be exposed on `RunResult.strategy` and surfaced
    in the clarifying question (REQ-063) so the user gets one concrete next-action
    label rather than only a free-form sentence.'
  source: ARCHITECTURE.md
  status: defined
- id: REQ-097
  title: specsmith verify CLI Subcommand
  description: 'The Specsmith CLI must expose a `specsmith verify` subcommand that
    consumes the verification input contract (REQ-027): file diffs, test results,
    execution logs, and changed files (paths or `--stdin` JSON). The subcommand must
    emit a JSON object with at least `equilibrium`, `confidence`, `summary`, `files_changed`,
    `test_results`, and `retry_strategy`. Exit code 0 on equilibrium with confidence
    ≥ the configured threshold, 2 when retry is recommended, and 3 when stop-and-align
    is required.'
  source: ARCHITECTURE.md
  status: defined
- id: REQ-098
  title: Confidence Threshold Must Be Read From .specsmith/config.yml
  description: Both `specsmith preflight` and the broker's `run_preflight` helper
    must consult `.specsmith/config.yml` for the `epistemic.confidence_threshold`
    value (REQ-058) and use it as the floor for the JSON `confidence_target` field
    whenever it is greater than the heuristic default. When the config file is absent
    or unparseable, the existing heuristic defaults must continue to apply.
  source: .specsmith/config.yml, ARCHITECTURE.md
  status: defined
- id: REQ-099
  title: Accepted Preflight Must Record a Distinct work_proposal Event
  description: When `specsmith preflight` produces an `accepted` decision and assigns
    a brand-new `work_item_id`, the CLI must append a `work_proposal` ledger event
    in addition to the existing `preflight` event (REQ-044). The `work_proposal` entry
    must reference REQ-044 and REQ-085, include the `work_item_id` and matched `requirement_ids`,
    and must NOT be emitted when the underlying `work_item_id` already appears in
    `LEDGER.md` (no duplicate proposals).
  source: ARCHITECTURE.md
  status: defined
- id: REQ-100
  title: Broker Scope Inference May Surface Stress-Test Critical Failures
  description: When the user passes `--stress` to `specsmith preflight` and the matched
    requirements set is non-empty, the CLI must invoke the existing AEE `StressTester`
    against those belief artifacts and surface any critical failures in the JSON payload
    as a `stress_warnings` list. The narration (verbose mode) must include a one-sentence
    plain-English warning when at least one critical failure is found. The flag must
    default off so unrelated tests continue to pass.
  source: ARCHITECTURE.md
  status: defined
- id: REQ-101
  title: Lint Baseline Must Be Clean
  description: '`ruff check src/ tests/` and `ruff format --check src/ tests/` must
    both exit zero on `develop`. The lint job in `.github/workflows/ci.yml` enforces
    this contract. Per-file ignores in `pyproject.toml` are reserved for documentation
    modules whose long lines are intentional (e.g. `toolrules.py`, `tool_installer.py`).'
  source: .github/workflows/ci.yml, pyproject.toml
  status: defined
- id: REQ-102
  title: Type-Check Baseline Must Be Clean
  description: '`mypy src/specsmith/` must exit zero on `develop`. Strict-mypy is
    preserved for the historically-typed modules; dynamically-typed modules in `specsmith.agent.*`,
    `specsmith.console_utils`, `specsmith.serve`, and the agent-orchestrator surface
    are explicitly enumerated in the `[[tool.mypy.overrides]]` `ignore_errors=true`
    block of `pyproject.toml` until they are individually annotated.'
  source: .github/workflows/ci.yml, pyproject.toml
  status: defined
- id: REQ-103
  title: Security Baseline Tolerates Unfixed pip Advisory
  description: The CI security job must upgrade pip to the latest release before invoking
    `pip-audit`, and must pass the `--ignore-vuln CVE-2026-3219` flag for the unfixed
    pip advisory so the runner's own pip version does not block PRs. Specsmith's actual
    runtime dependencies (click, jinja2, pyyaml, pydantic, rich) must remain pip-audit
    clean; any new advisory against them must trigger a dependency bump rather than
    another ignore-flag.
  source: .github/workflows/ci.yml
  status: defined
- id: REQ-104
  title: Work Items Must Mirror Implemented REQs
  description: '`.specsmith/workitems.json` must derive from `.specsmith/requirements.json`
    and `.specsmith/testcases.json`. For each REQ-N there must be a matching WORK-N
    entry with `requirement_id=REQ-N`, `test_case_ids` listing every TEST joined by
    `requirement_id`, and `status=complete` when the REQ is implemented in source.
    The `scripts/sync_workitems.py` helper is the canonical sync.'
  source: scripts/sync_workitems.py, .specsmith/workitems.json
  status: defined
- id: REQ-105
  title: Live Smoke Evidence Must Be Reproducible Or Honestly Skipped
  description: A live or honestly-skipped invocation of `scripts/nexus_smoke.py` against
    the configured `l1-nexus` model must be captured under `.specsmith/runs/WI-NEXUS-011/logs.txt`.
    The skip note must include a fresh probe attempt, a timestamp, and the hardware/environment
    reason the live container could not be reached.
  source: .specsmith/runs/WI-NEXUS-011/logs.txt, scripts/nexus_smoke.py
  status: defined
- id: REQ-106
  title: Kairos Must Surface Governance Commands
  description: 'The Kairos terminal client must provide UI access to the three primary
    governance operations: preflight gate, verify, and governance trace (`/why`).
    These are surfaced via the Governance settings page and the BYOE proxy at `http://127.0.0.1:7700`.
    *Note: the legacy `specsmith-vscode` commands (`specsmith.runPreflight`, `specsmith.runVerify`,
    `specsmith.toggleWhy`) are deprecated; Kairos is the flagship client as of v0.10.1.*'
  source: app/src/settings_view/governance_page.rs, kairos_governance crate
  status: defined
- id: REQ-107
  title: ARCHITECTURE.md Must Reflect Current State
  description: '`ARCHITECTURE.md` must contain a ''Current State'' section listing
    the realized broker, harness, retry strategies, CI baseline, Kairos governance
    integration, live-smoke evidence note, and documentation surface. The section
    is the source of truth for ''the system as built'' and must be updated each time
    a release is cut.'
  source: ARCHITECTURE.md
  status: defined
- id: REQ-108
  title: Real Verifier Signal Must Drive Confidence
  description: '`Orchestrator._build_task_result` must derive `TaskResult.confidence`
    and `equilibrium` from a real verifier (`src/specsmith/agent/verifier.py`) that
    inspects test results, ruff output, and mypy output for the changed files. The
    hardcoded 0.85 / 0.4 / 0.0 placeholder must be removed.'
  source: src/specsmith/agent/verifier.py, src/specsmith/agent/orchestrator.py
  status: defined
- id: REQ-109
  title: Live `l1-nexus` Smoke Overlay Must Produce ok=true on 7B Hardware
  description: 'Specsmith ships a `docker-compose.smoke.yml` overlay that swaps `l1-nexus`
    to a 7B GPTQ-Int4 model fitting <=8 GB VRAM, and `.specsmith/runs/WI-NEXUS-029/logs.txt`
    documents how to capture an `ok: true` smoke result with `NEXUS_LIVE=1` against
    that overlay.'
  source: docker-compose.smoke.yml, .specsmith/runs/WI-NEXUS-029/logs.txt
  status: defined
- id: REQ-110
  title: End-to-End Nexus Path Must Be Integration-Tested
  description: '`tests/test_e2e_nexus.py` exercises the broker -> preflight -> harness
    -> orchestrator -> verifier path with a `FakeOrchestrator` and asserts ledger
    events, `RunResult.success`, and retry-strategy classification on a scripted failure-then-recovery
    sequence.'
  source: tests/test_e2e_nexus.py
  status: defined
- id: REQ-111
  title: Mypy Strict Carveout Must Shrink Toward Zero
  description: At least the four newly-annotated dynamic agent modules (`broker`,
    `safety`, `console_utils`, `indexer`) are fully type-annotated and removed from
    the `[[tool.mypy.overrides]] ignore_errors=true` block in `pyproject.toml`. The
    remaining carveout (orchestrator, repl, tools, cleanup, serve) is documented as
    a 1.x cleanup target.
  source: pyproject.toml, src/specsmith/agent/*.py, src/specsmith/console_utils.py
  status: defined
- id: REQ-112
  title: Streaming Token Bridge Must Emit JSONL Events
  description: A new `specsmith chat <utterance> --json-events` CLI subcommand drives
    the broker + harness end-to-end and emits a JSONL event stream on stdout with
    at least the event types `block_start`, `token`, `tool_call`, `tool_result`, `block_complete`,
    and `task_complete`. Each event is a single JSON object on its own line.
  source: src/specsmith/cli.py, src/specsmith/agent/events.py
  status: defined
- id: REQ-113
  title: Block-Based Output Schema
  description: Every `block_start` event carries a `block_id`, `kind` (one of `plan`,
    `message`, `tool_call`, `tool_result`, `diff`, `test_results`, `verdict`), `agent`,
    and `timestamp`. The corresponding `block_complete` reuses the same `block_id`.
    Schema is documented in `docs/site/chat-events.md`.
  source: src/specsmith/agent/events.py, docs/site/chat-events.md
  status: defined
- id: REQ-114
  title: Plan Block Must Surface Steps
  description: When the broker classifies an utterance as a `change` and preflight
    is `accepted`, the chat stream must emit a `plan` block whose payload is a list
    of `{step_id, title, status}` items. Status transitions (`pending` -> `running`
    -> `done` / `failed`) are emitted as `plan_step` events keyed by `step_id`.
  source: src/specsmith/agent/events.py
  status: defined
- id: REQ-115
  title: Permission/Autonomy Tier Must Be Honored End-to-End
  description: '`specsmith chat` accepts `--profile {safe,standard,open,admin}` (default
    reads `scaffold.yml`). Under `safe`, every tool call emits a `tool_request` event
    and waits for an inbound `tool_decision` line on stdin (`{decision: ''approve''|''deny''}`).
    Under `standard` / `open` the harness proceeds without prompting. The selected
    profile is recorded in the ledger entry.'
  source: src/specsmith/cli.py, src/specsmith/profiles.py
  status: defined
- id: REQ-116
  title: Inline Diff Review Must Round-Trip Comments
  description: '`specsmith chat` emits a `diff` block per file changed by the orchestrator;
    subsequent stdin lines of the form `{type: ''comment'', block_id, path, line,
    body}` are stored in the session memory and surfaced to the bounded-retry harness
    as additional context on the next attempt. `--comment` flag on `specsmith verify`
    does the equivalent for non-streaming use.'
  source: src/specsmith/agent/events.py, src/specsmith/cli.py
  status: defined
- id: REQ-117
  title: Predict-Only Preflight Must Not Allocate a Work Item
  description: '`specsmith preflight <utterance> --predict-only --json` returns the
    same JSON shape as the canonical `preflight` (intent, requirement_ids, instruction,
    etc.) but with `work_item_id == ''''`, no ledger event written, and a new `predicted_refinement`
    field that suggests a tightened utterance. Used by IDE autocomplete.'
  source: src/specsmith/cli.py
  status: defined
- id: REQ-118
  title: Kairos Must Surface specsmith chat Stream
  description: The Kairos governance proxy (`/v1/chat/completions`) consumes the `specsmith
    chat --json-events` JSONL stream and exposes it to the agent session. *The deprecated
    `specsmith-vscode` `specsmith.openChat` command served this purpose for the VS
    Code extension; it has been superseded by the Kairos BYOE proxy.*
  source: app/src/settings_view/governance_page.rs, kairos_governance crate
  status: defined
- id: REQ-119
  title: Project Rules Must Auto-Inject Into the System Prompt
  description: '`src/specsmith/agent/rules.py:load_rules(project_dir)` reads `docs/governance/*_RULES.md`
    and the H-rules from `AGENTS.md`, returning a single deterministic system-prompt
    prefix string. The orchestrator prepends this string to every AG2 agent''s `system_message`
    at construction time.'
  source: src/specsmith/agent/rules.py, src/specsmith/agent/orchestrator.py
  status: defined
- id: REQ-120
  title: Persistent Session Memory Must Be Token-Budgeted
  description: '`src/specsmith/agent/memory.py` provides `append_turn(session_id,
    turn)` and `recent_turns(session_id, max_chars)` that read/write `.specsmith/sessions/<session_id>/turns.jsonl`.
    `specsmith chat --session-id <id>` injects the most recent N turns (within `max_chars`)
    into the orchestrator''s first message.'
  source: src/specsmith/agent/memory.py
  status: defined
- id: REQ-121
  title: MCP Tool Consumption Must Be Configuration-Driven
  description: '`src/specsmith/agent/mcp.py:load_mcp_tools(project_dir)` reads `.specsmith/mcp.yml`
    (a list of `{name, command, args, env}` entries) and returns Nexus-tool wrappers
    that proxy to each external MCP server via stdio. The Specsmith safety middleware
    wraps every MCP tool call.'
  source: src/specsmith/agent/mcp.py, .specsmith/mcp.yml
  status: defined
- id: REQ-122
  title: Dynamic Agent/Model Routing Must Be Pluggable
  description: '`src/specsmith/agent/router.py:choose_tier(intent, scope, retry_count)`
    returns one of `{coder, heavy, fast}` based on `.specsmith/config.yml routing:`
    overrides. The orchestrator builds a model-config map keyed by tier and selects
    the appropriate `llm_config` per agent.'
  source: src/specsmith/agent/router.py, .specsmith/config.yml
  status: defined
- id: REQ-123
  title: Notebook Capture and Replay
  description: '`specsmith notebook record --session-id <id> --slug <name>` writes
    `docs/notebooks/<slug>.md` with the captured turns; `specsmith notebook replay
    <slug>` re-runs each utterance through `specsmith chat` (using the recorded `--profile`),
    re-checking governance gates.'
  source: src/specsmith/cli.py, docs/notebooks/
  status: defined
- id: REQ-124
  title: Performance Baseline Must Be Measured and Tracked
  description: '`scripts/perf_smoke.py` synthesizes a 1000-REQ `REQUIREMENTS.md` in
    tmp_path, runs `specsmith preflight` 50 times, and writes p50 / p95 / p99 to `.specsmith/perf/baseline.json`.
    CI reports the deltas vs the committed baseline as a non-blocking warning.'
  source: scripts/perf_smoke.py, .specsmith/perf/baseline.json
  status: defined
- id: REQ-125
  title: Multi-Session Parallel Agents
  description: '`specsmith chat` accepts `--parent-session <id>`. When set, the spawned
    session''s `task_complete` event also writes a `sub_session_complete` event into
    the parent''s session log so the parent''s plan-block can surface child outcomes.'
  source: src/specsmith/cli.py, src/specsmith/agent/memory.py
  status: defined
- id: REQ-127
  title: Onboarding Path Must Be Verified
  description: '`specsmith doctor --onboarding` prints a checklist (CLI installed,
    env activated, scaffold.yml present, REQUIREMENTS.md present, vLLM endpoint reachable,
    ledger present) and exits non-zero if any required item is missing. `docs/site/getting-started.md`
    walks a fresh user from install to first accepted preflight.'
  source: src/specsmith/doctor.py, src/specsmith/cli.py, docs/site/getting-started.md
  status: defined
- id: REQ-128
  title: Cross-Repo Security Sweep
  description: 'The specsmith and kairos repos both run `pip-audit` / `cargo audit`
    in CI and fail on high-or-critical findings. Dependabot manifests in both repos
    are reviewed and any open alert at 1.0 release time is documented. *Note: the
    legacy `specsmith-vscode` npm audit requirement has been retired alongside the
    extension deprecation.*'
  source: .github/workflows/ci.yml, BitConcepts/kairos/.github/workflows/ci.yml
  status: defined
