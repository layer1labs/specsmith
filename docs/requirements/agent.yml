- id: REQ-119
  title: Project Rules Must Auto-Inject Into the System Prompt
  description: '`src/specsmith/agent/rules.py:load_rules(project_dir)` reads `docs/governance/*_RULES.md`
    and the H-rules from `AGENTS.md`, returning a single deterministic system-prompt
    prefix string. The orchestrator prepends this string to every AG2 agent''s `system_message`
    at construction time.'
  source: src/specsmith/agent/rules.py, src/specsmith/agent/orchestrator.py
  status: implemented
- id: REQ-120
  title: Persistent Session Memory Must Be Token-Budgeted
  description: '`src/specsmith/agent/memory.py` provides `append_turn(session_id,
    turn)` and `recent_turns(session_id, max_chars)` that read/write `.specsmith/sessions/<session_id>/turns.jsonl`.
    `specsmith chat --session-id <id>` injects the most recent N turns (within `max_chars`)
    into the orchestrator''s first message.'
  source: src/specsmith/agent/memory.py
  status: implemented
- id: REQ-121
  title: MCP Tool Consumption Must Be Configuration-Driven
  description: '`src/specsmith/agent/mcp.py:load_mcp_tools(project_dir)` reads `.specsmith/mcp.yml`
    (a list of `{name, command, args, env}` entries) and returns Nexus-tool wrappers
    that proxy to each external MCP server via stdio. The Specsmith safety middleware
    wraps every MCP tool call.'
  source: src/specsmith/agent/mcp.py, .specsmith/mcp.yml
  status: implemented
- id: REQ-122
  title: Dynamic Agent/Model Routing Must Be Pluggable
  description: '`src/specsmith/agent/router.py:choose_tier(intent, scope, retry_count)`
    returns one of `{coder, heavy, fast}` based on `.specsmith/config.yml routing:`
    overrides. The orchestrator builds a model-config map keyed by tier and selects
    the appropriate `llm_config` per agent.'
  source: src/specsmith/agent/router.py, .specsmith/config.yml
  status: implemented
- id: REQ-123
  title: Notebook Capture and Replay
  description: '`specsmith notebook record --session-id <id> --slug <name>` writes
    `docs/notebooks/<slug>.md` with the captured turns; `specsmith notebook replay
    <slug>` re-runs each utterance through `specsmith chat` (using the recorded `--profile`),
    re-checking governance gates.'
  source: src/specsmith/cli.py, docs/notebooks/
  status: implemented
- id: REQ-124
  title: Performance Baseline Must Be Measured and Tracked
  description: '`scripts/perf_smoke.py` synthesizes a 1000-REQ `REQUIREMENTS.md` in
    tmp_path, runs `specsmith preflight` 50 times, and writes p50 / p95 / p99 to `.specsmith/perf/baseline.json`.
    CI reports the deltas vs the committed baseline as a non-blocking warning.'
  source: scripts/perf_smoke.py, .specsmith/perf/baseline.json
  status: implemented
- id: REQ-125
  title: Multi-Session Parallel Agents
  description: '`specsmith chat` accepts `--parent-session <id>`. When set, the spawned
    session''s `task_complete` event also writes a `sub_session_complete` event into
    the parent''s session log so the parent''s plan-block can surface child outcomes.'
  source: src/specsmith/cli.py, src/specsmith/agent/memory.py
  status: implemented
- id: REQ-127
  title: Onboarding Path Must Be Verified
  description: '`specsmith doctor --onboarding` prints a checklist (CLI installed,
    env activated, scaffold.yml present, REQUIREMENTS.md present, vLLM endpoint reachable,
    ledger present) and exits non-zero if any required item is missing. `docs/site/getting-started.md`
    walks a fresh user from install to first accepted preflight.'
  source: src/specsmith/doctor.py, src/specsmith/cli.py, docs/site/getting-started.md
  status: implemented
- id: REQ-128
  title: Cross-Repo Security Sweep
  description: The specsmith repos both run `pip-audit` / `cargo audit` in CI and
    fail on high-or-critical findings. Dependabot manifests in both repos are reviewed
    and any open alert at 1.0 release time is documented.
  source: .github/workflows/ci.yml
  status: implemented
- id: REQ-129
  title: 1.0 API Stability Commitment
  description: '`docs/site/api-stability.md` enumerates the public surfaces frozen
    at 1.0 (CLI subcommands and exit codes, JSON payload schemas for preflight / verify
    / chat events, broker module API, ledger event schemas, CLI API surface). The
    PyPI classifier is bumped to `Development Status :: 5 - Production/Stable` and
    `pyproject.toml` to `1.0.0`.'
  source: docs/site/api-stability.md, pyproject.toml
  status: implemented
