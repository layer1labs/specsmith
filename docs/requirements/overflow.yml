# specsmith requirements — overflow
# CANONICAL SOURCE: edit this file, not docs/REQUIREMENTS.md
# docs/REQUIREMENTS.md is regenerated from these YAML files.
#
# Schema: id (REQ-NNN), title, description, source, status
# Required fields: id, title, status
- id: REQ-400
  title: Context Eviction ESDB Write-Back
  description: 'ContextOrchestrator._evict_low_confidence_records() must actually
    write back to the store: for SqliteStore call store.delete(rec.id) (tombstone);
    for ChronoStore call store.invalidate() or tombstone. The method must return the
    count of records actually tombstoned, not just counted.

    '
  status: accepted
  source: architecture
  priority: P2
  domain: esdb
- id: REQ-401
  title: M008 ESDB Full-Coverage Backfill Migration
  description: 'Migration version 8 (m008_esdb_full_coverage) backfills existing flat
    JSON state into ESDB on first run: reads workitems.json and upserts each WI as
    kind="work_item"; reads SQLite audit_events and upserts each as kind="ledger_event".
    Idempotent via .specsmith/esdb-full-coverage marker file. Runs automatically via
    specsmith migrate run.

    '
  status: accepted
  source: architecture
  priority: P1
  domain: esdb
- id: REQ-402
  title: ESDB Record Kind Taxonomy Documentation
  description: 'ARCHITECTURE.md section 19 (ChronoMemory ESDB) must include a complete
    record kinds table (preflight_decision, verify_result, work_item, ledger_event,
    compliance_evidence, dispatch_result) with write-source for each kind. The chronomemory-esdb
    governance skill must include the same table plus write-path code examples for
    specsmith-internal callers.

    '
  status: accepted
  source: architecture
  priority: P2
  domain: esdb
- id: REQ-403
  title: ledger_event Dual-Write from add_entry
  description: ledger.add_entry() MUST best-effort upsert a SqliteRecord(kind="ledger_event",
    confidence=0.9) into ESDB immediately after writing LEDGER.md. The upsert MUST
    be wrapped in try/except so a broken ESDB never blocks the ledger write. The record
    MUST carry description, entry_type, author, reqs, status, epistemic_status, belief_artifacts,
    entry_hash, and timestamp fields in its data dict. Source_ids MUST be populated
    from the reqs field (comma-split).
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-404
  title: seal_record Dual-Write from TraceVault._append
  description: TraceVault._append() MUST best-effort upsert a SqliteRecord(kind="seal_record",
    confidence=0.9, id="ESDB-{seal_id}") into ESDB immediately after appending to
    trace.jsonl. The upsert MUST be wrapped in try/except. The record data MUST be
    the full SealRecord.to_dict() output. source_ids MUST be populated from artifact_ids.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-405
  title: session_metric Dual-Write from MetricsStore.append
  description: MetricsStore.append() MUST best-effort upsert a SqliteRecord(kind="session_metric",
    confidence=0.8, id="MET-{session_id}") into ESDB immediately after writing to
    session_metrics.jsonl. The upsert MUST be wrapped in try/except. The record data
    MUST be the full MetricsRecord.to_dict() output. source_ids MUST be populated
    from work_item_id when present.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-406
  title: M009 ESDB-First Backfill Migration
  description: 'specsmith MUST include migration M009 (version=9) that backfills existing
    loose state files into ESDB records. M009 MUST: (1) parse every ## heading in
    LEDGER.md and upsert as ledger_event; (2) parse every line of trace.jsonl and
    upsert as seal_record; (3) parse every line of session_metrics.jsonl and upsert
    as session_metric. M009 MUST be idempotent via a marker file (.specsmith/esdb-m009-backfill),
    non-destructive, and registered in MigrationRegistry.'
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-407
  title: ESDB-First Ledger Snippet in context_seed
  description: build_context_seed() MUST query ESDB ledger_event records first when
    loading the ledger snippet. Only if ESDB has no ledger_event records MUST it fall
    back to reading LEDGER.md directly. The ESDB query MUST sort by timestamp descending
    and return the last max_ledger records as formatted lines.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-408
  title: ESDB-First Commit Message in generate_commit_message
  description: vcs_commands.generate_commit_message() MUST query ESDB ledger_event
    records first. It MUST select the record with the latest timestamp and return
    its description field truncated to 72 characters. Only if ESDB has no ledger_event
    records MUST it fall back to reading LEDGER.md.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-409
  title: specsmith inspect and ledger export CLI Commands
  description: 'specsmith MUST provide a top-level `inspect` CLI command that displays
    a bordered block containing: governance health (audit result), active work items,
    EFF-CURRENT efficiency snapshot, and 5-dimension epistemic quality score. specsmith
    MUST also provide `ledger export` (subcommand of ledger group) that queries ledger_event
    records from ESDB (default) or LEDGER.md (--source file) and emits text or JSON
    output. Both commands MUST support --project-dir and --json flags.'
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-410
  title: Token Metric ESDB Write Path from AgentRunner
  description: AgentRunner._handle_command() MUST best-effort call write_token_metric()
    after every ChatRunResult. The call MUST pass input_tokens, output_tokens, cost_usd,
    model (provider name), command_source (activity), and work_item_id from the active
    session state. The write MUST be wrapped in try/except and never block the chat
    loop.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-411
  title: EFF-CURRENT efficiency_metric ESDB Record
  description: specsmith MUST maintain a singleton EFF-CURRENT record (kind="efficiency_metric",
    id="EFF-CURRENT", confidence=1.0) in ESDB. compute_and_upsert_efficiency(root)
    MUST read the last 20 session_metric, token_metric, and context_usage records,
    compute tokens_per_correct_answer, cost_of_pass_usd, quality_trend_7d, mean_rework_turns,
    context_char_efficiency, context_health_score, baseline (last 50), degraded flag,
    and epistemic_quality, then upsert EFF-CURRENT. The function MUST be best-effort
    (returns False on error). compute_and_upsert_efficiency() MUST be called from
    specsmith save and the serve.py _session_save endpoint.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-412
  title: ESDB Sweep with Per-Kind Retention
  description: 'specsmith MUST provide esdb_sweep.run_sweep(root, orphans_only, dry_run)
    that tombstones active records whose retention period has expired. Retention periods:
    session_metric=60d, context_usage=30d, ledger_event=90d, seal_record/token_metric/
    efficiency_metric=forever. The full sweep (orphans_only=False) MUST also call
    compute_and_upsert_efficiency() to refresh EFF-CURRENT. run_sweep MUST return
    a SweepResult dataclass with tombstoned, orphans_flagged, efficiency_refreshed,
    errors, and kinds_swept counts.'
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-413
  title: Orphan Detection for work_item and preflight_decision Records
  description: run_sweep() MUST detect and tombstone orphaned records. A work_item
    record is an orphan if it is active in ESDB but absent from workitems.json. A
    preflight_decision record is an orphan if its parent work_item_id is not found
    in ESDB or workitems.json. Orphan detection MUST run in both full and orphans_only=True
    modes.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-414
  title: Epistemic Quality Score in EFF-CURRENT
  description: 'compute_epistemic_quality(root) MUST compute a 5-dimension composite
    score: confidence_density (weight 0.30, fraction of active records with confidence>=0.7),
    recency_score (0.20, records with timestamp < 90 days), coherence_score (0.20,
    work_items with matching preflight_decision), closure_score (0.15, verify_results
    / preflight_decisions), non_contradiction_score (0.15, 1 minus duplicate label
    ratio). Composite MUST be clamped to [0.0, 1.0] and stored in EFF-CURRENT.epistemic_quality.'
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-415
  title: Context Seed Auto-Tune from EFF-CURRENT
  description: 'build_context_seed() MUST load EFF-CURRENT from ESDB before assembling
    the seed. When degraded=True, it MUST reduce char_budget by 25%. When context_char_efficiency>0.9,
    it MUST halve max_ledger (minimum 10). ContextOrchestrator.check_and_optimize()
    MUST load dynamic thresholds from EFF-CURRENT: when degraded=True, all three tier
    thresholds MUST be reduced by 5 percentage points.'
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-416
  title: context_usage Records from build_context_seed and ContextOrchestrator
  description: build_context_seed() MUST write a SqliteRecord(kind="context_usage",
    id="CTX-{session_id}", confidence=1.0) to ESDB after assembling each seed, containing
    session_id, seed_chars, seed_fill_pct, turns_count, degraded_at_seed, and timestamp.
    ContextOrchestrator.check_and_optimize() MUST upsert the latest context_usage
    record's peak_fill_pct field when a higher fill percentage is observed. Both efficiency_metric
    and context_usage kinds MUST be exempt from _evict_low_confidence_records().
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-417
  title: Honest ESDB Integrity Reporting in status and resume
  description: specsmith esdb status and specsmith resume MUST report the actual ESDB
    hash-chain verification result. esdb status MUST render "Integrity OK" only when
    chain_valid() is true and "Integrity FAILED" when it is false, instead of a hardcoded
    "Integrity OK" label. resume MUST drive its leading ESDB indicator from status.chain_valid
    (green check only when valid, red cross when invalid) rather than always printing
    a green check.
  source: ARCHITECTURE.md [ESDB Extended Management]
  status: implemented
- id: REQ-418
  title: Preflight CLI Delegates to run_preflight
  description: 'The `specsmith preflight` CLI command MUST delegate its decision to
    governance_logic.run_preflight(utterance, project_dir) so that explicit REQ-NNN
    references and the synced requirements.json drive the result, instead of relying
    on self-contained heuristics. The command MUST preserve its existing flags: --predict-only
    emits a predicted_refinement (and persists no work item) when the decision is
    needs_clarification; --stress appends stress_warnings; --verbose appends narration;
    and accepted, non-predict-only runs still append a ledger entry when LEDGER.md
    exists. Exit codes MUST remain accepted=0, needs_clarification=2, blocked/rejected=3,
    and the REQ-098 confidence floor MUST NOT be applied twice.'
  source: ARCHITECTURE.md [Preflight]
  status: implemented
- id: REQ-419
  title: ESDB Status Human-Readable Output Never Aborts
  description: '`specsmith esdb status` in human-readable (non-JSON) mode MUST emit
    its output via a resilient stdout write path that cannot raise a spurious Click
    Abort or KeyboardInterrupt on legacy Windows consoles. It MUST build plain-text
    lines (no Rich markup) and write them through the same sys.stdout.write + flush
    pattern, with a stderr fallback, used by the --json branch. The REQ-417 "Integrity
    OK" / "Integrity FAILED" line MUST be preserved.'
  source: ARCHITECTURE.md [ESDB Extended Management]
  status: implemented
- id: REQ-420
  title: ESDB-Only Trace Vault Readiness and Persistence
  description: The trace vault MUST treat ESDB as its single source of truth. TraceVault._load()
    MUST reconstruct seals exclusively from ESDB seal_record records (via SealRecord.from_dict
    on each record's data) and TraceVault._append() MUST persist new seals to ESDB
    only, no longer writing .specsmith/trace.jsonl. The phase readiness helpers (_trace_vault_exists,
    _trace_vault_min_seals) MUST count active seal_record records in ESDB rather than
    reading trace.jsonl. This path is forward-only with no jsonl fallback; an ESDB
    error MUST be treated as zero seals. The hash chain MUST continue to verify via
    content_hash/prev_hash/entry_hash in the record data.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-421
  title: Legacy Flat-File Deprecation Registry
  description: 'specsmith MUST maintain a single greppable registry of legacy flat-file
    persistence sites slated for removal once ESDB is the sole source of truth, so
    a future teardown is a one-grep operation. Every such site in src/specsmith MUST
    carry a `# DEPRECATED(REQ-421):` marker comment, and docs/DEPRECATIONS.md MUST
    enumerate each marker with its file, the legacy artifact, the ESDB record kind
    that supersedes it, and the follow-up item. The registry MUST include the planned
    (not-yet-executed) teardown items: flipping work_item persistence to ESDB-first
    (superseding workitems.json) and stopping sync from regenerating the .specsmith/requirements.json
    and testcases.json caches. No legacy file or fallback may be deleted by this requirement;
    it only records and annotates them.'
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-422
  title: SQLite-Backend Parity for Retrieval and Critical-Count
  description: When ESDB runs on the free SQLite backend (no ChronoMemory), governance
    knowledge MUST still flow through the same runtime paths as the commercial backend.
    retrieval.build_index() MUST inject ESDB records into the RAG index via SqliteStore.query(rag_filter=True)
    — excluding infrastructure kinds (edge, rollback_event, token_metric, skill_run,
    efficiency_metric, context_usage) — when ChronoStore is unavailable, instead of
    indexing nothing. ContextOrchestrator._count_critical_records() MUST fall back
    to counting active SQLite records with confidence >= CRITICAL_CONFIDENCE rather
    than returning 0. Commercial-only capabilities MUST remain optional and degrade
    to no-ops on SQLite.
  source: ARCHITECTURE.md §ESDB-First Migration
  status: implemented
- id: REQ-423
  title: Governed benchmark claims must be statistically supported
  status: implemented
  description: GovernanceBench MUST report observed pass rate, confidence intervals,
    token use, and global cost-of-pass without assuming a stochastic model achieves
    100% correctness. Publication claims require complete comparable cells and enough
    repetitions to distinguish signal from sampling noise. A zero-pass task MUST remain
    in aggregate cost-of-pass rather than being silently excluded.
  test_ids:
  - TEST-433
- id: REQ-424
  title: CI pipeline must produce zero CodeQL static analysis alerts on every run
  description: Promoted from WI-0CEA445B. The codebase must produce zero CodeQL static
    analysis alerts on every CI run
  source: WI-0CEA445B
  status: planned
  test_ids:
  - TEST-434
- id: REQ-425
  title: Deterministic benchmark governance must fail safely on unclear scope
  description: The benchmark harness MUST run governance outside the model token path
    against isolated task state. Accepted coding tasks receive only linked requirement,
    test, confidence, and uncertainty evidence. Ambiguous or destructive tasks MUST
    short-circuit safely on needs_clarification; the harness MUST never fabricate
    a requirement, bypass the decision, or prompt a model to implement anyway.
  source: WI-B73B339B
  status: implemented
  test_ids:
  - TEST-435
- id: REQ-426
  title: Benchmark completion budgets must be bounded and model-compatible
  status: implemented
  description: The harness MUST use each provider's compatible completion-budget parameter,
    keep a bounded default sufficient for tool calls, cap agent turns and context,
    and allow explicit environment overrides for diagnostic runs. It MUST NOT grant
    an unconditional oversized output budget merely because a model can reason.
- id: REQ-427
  title: GovernanceBench metrics/report statistical and leaderboard outputs
  status: planned
  description: GovernanceBench metrics/report shall compute Wilson pass-rate confidence
    intervals, bootstrap cost-of-pass confidence intervals, first-pass and consistency
    statistics, scaffold-lift vs UNGOVERNED, model-tier mapping, democratization and
    Pareto summaries, and Hugging Face leaderboard JSON/rendered report sections.
- id: REQ-428
  title: gitignore normalizer must enforce disjoint allow/deny policy and untrack
    diverged paths
  status: planned
  description: normalize_esdb_gitignore_policy in sync.py must (a) separate tracked
    paths from ignored paths in two disjoint sets, (b) never emit a bare ignore rule
    for a path it also allows, (c) run git rm --cached for any deny-listed path found
    in git ls-files, and (d) make esdb_migration_manifest.json explicitly tracked
- id: REQ-429
  title: 'checkpoint ESDB field must reflect active backend: show SQLite record count
    and chain status when chronomemory is unavailable, ChronoMemory count otherwise,
    and N/A when no ESDB is present'
  status: planned
  description: The 'specsmith checkpoint' GOVERNANCE ANCHOR box must accurately show
    the active ESDB backend. When chronomemory (commercial) is the active backend
    and WAL exists, show record count and chain validity as now. When SQLite is the
    active backend (chronomemory absent or WAL missing), show 'SQLite (N recs, ✓ chain)'
    with actual SqliteStore record count and chain_valid() result. When no ESDB is
    present at all, show 'N/A'. The current 0-record default is misleading for SQLite-only
    installations.
- id: REQ-430
  title: preflight release classifier must distinguish release execution from release
    tooling edits
  status: planned
  description: The deterministic broker must not classify edits to release.yml, packaging
    scripts, dist files, and release documentation as intent=release. Only utterances
    that explicitly execute a release (cut, publish, ship, tag vX.Y.Z, bump version)
    should trigger the release gate. Maintenance of release tooling must fall through
    to CHANGE classification so it can be accepted by scope-matching.
- id: REQ-431
  title: preflight release intent must accept when known scope matched or explicit
    REQ cited, and always allocate a work item
  status: planned
  description: 'When intent=release is classified: (a) if the utterance contains explicit
    release-management REQ IDs (e.g. REQ-050, REQ-051) or the scope confidence >=
    0.6, the decision must be accepted as a governed change; (b) needs_clarification
    must still allocate a work_item_id so specsmith approve --work-item can proceed;
    (c) the instruction must reference --req flag for explicit override. The current
    dead-end (needs_clarification + empty work_item_id) makes approve impossible.'
- id: REQ-432
  title: audit must flag empty or fallback-only governance YAML rule sets
  status: planned
  description: 'check_governance_yaml_content must iterate .specsmith/governance/*.yaml;
    fail audit if any file has rules: [] or rules: [{note: ...}] only. Gate on presence
    of governance dir. m001 silent-skip when source_md missing must become a loud
    warning.'
- id: REQ-433
  title: sync must warn when REQUIREMENTS.md contains REQ IDs absent from docs/requirements
    YAML files
  status: planned
  description: In YAML-first mode run_sync must compare IDs in docs/REQUIREMENTS.md
    against those loaded from docs/requirements/*.yml; emit SyncWarning for any ID
    present in markdown but absent from YAML with hint to add to yml and re-run sync.
    Same pattern for TESTS.md vs docs/tests/*.yml.
- id: REQ-434
  title: CLI verify_cmd must wire equilibrium to WI mark_implemented and files_touched
  status: planned
  description: verify_cmd (cli.py) computes equilibrium but never calls WorkItemStore.mark_implemented
    or sets files_touched on the WI, unlike governance_logic.run_verify. verify_cmd
    must call run_verify from governance_logic or mirror the WI-update logic so WI
    status advances to implemented on equilibrium.
- id: REQ-435
  title: infer_scope must apply a minimum relevance score threshold to drop incidental
    matches
  status: planned
  description: infer_scope currently returns up to top_k=3 results with no minimum
    score floor (only overlap>0). Add min_score=0.15 parameter; filter out matches
    below threshold before returning. Update run_preflight to pass min_score=0.15
    so only genuinely related requirements are associated with work items.
- id: REQ-436
  title: session_metrics.jsonl must record real token counts, cost, model, and work_item_id
    per turn
  status: planned
  description: session_metrics.jsonl auto-save path passes only command=save with
    all telemetry defaults zero. Real per-turn token usage is captured in ESDB token_metric
    via write_token_metric (runner.py:614). Add flush_session_metrics helper that
    reads the most recent ESDB token_metric record and appends a populated MetricsRecord
    to session_metrics.jsonl after write_token_metric is called.
- id: REQ-437
  title: Datasource adapters must define retrieval contracts, resilience behavior,
    and citation normalization guarantees
  status: planned
  description: The datasources module (src/specsmith/datasources/) provides patent,
    publication, and citation adapters. Each adapter must declare a typed retrieval
    contract, handle transient failures with retry/backoff, and normalize citation
    output to a canonical schema. Absence of these guarantees makes adapter output
    unpredictable for governance evidence packs.
- id: REQ-438
  title: GUI commands and views must provide governed parity with core CLI state and
    error semantics
  status: planned
  description: The GUI surface (src/specsmith/gui/) exposes governance state visually.
    Every GUI action that maps to a CLI command must produce identical governance
    outcomes (preflight, audit, sync). GUI error messages must be derived from the
    same error taxonomy as the CLI. No silent failures.
- id: REQ-439
  title: IDE integration adapters must implement a uniform capability and error-handling
    contract
  status: planned
  description: 'Integration adapters (src/specsmith/integrations/: aider, copilot,
    cursor, gemini, windsurf, claude) must each declare supported operations, degrade
    gracefully when the target tool is unavailable, and surface errors through specsmith
    governance events rather than silent fallbacks.'
- id: REQ-440
  title: Plugin management must define install, list, remove, and compatibility validation
    requirements
  status: planned
  description: 'The plugin lifecycle (specsmith plugin command + src/specsmith/plugins.py)
    must: enumerate installed plugins (list), validate manifests on install, reject
    incompatible plugin versions, and support removal without leaving orphaned state.
    Plugin errors must not propagate to core governance commands.'
- id: REQ-441
  title: specsmith plugin CLI must document and enforce plugin command surface (list,
    validate, install, remove)
  status: planned
  description: 'The specsmith plugin command is a CLI surface with no explicit REQ.
    It must: list all installed entry-point and manifest plugins (plugin list), validate
    plugin manifests before activation (plugin validate), and provide clear error
    messages when plugins fail to load.'
- id: REQ-442
  title: specsmith pr CLI must cover governed pull request creation, status, and merge
    workflows
  status: planned
  description: 'The specsmith pr (create-pr/governed-pr) command surface has no explicit
    REQ. It must: create PRs with governance comment blocks, evaluate PR governance
    status against open WIs, and block merge on policy violations when --required-check
    is set.'
- id: REQ-443
  title: specsmith ps CLI must surface process and session state for all tracked agent
    runs
  status: planned
  description: The specsmith ps command has no explicit REQ. It must list all tracked
    PIDs from .specsmith/pids/, report status (running/stopped/unknown) for each,
    and integrate with kill-session so process cleanup is auditable and idempotent.
- id: REQ-444
  title: Native Warp integration
  status: planned
  description: 'specsmith provides a first-class Warp integration: a ''warp'' integration
    adapter (specsmith integrate warp) that generates Warp-native artifacts (MCP governance
    server config, a Tab Config for a governed session, and a governance skill) so
    Warp''s agent is governed by specsmith; and the ''specsmith run'' REPL detects
    when it runs inside Warp (TERM_PROGRAM/WARP_*) and adapts its banner/ready frame
    accordingly.'
- id: REQ-445
  title: VRAM-aware local model recommendations
  status: planned
  description: 'First-class Ollama model recommendation engine: a model catalog with
    approximate Q4 VRAM footprints and a recommend_models(vram_gb)/recommend_for_hardware()
    API that selects a role lineup (default/coding, fast scratch, harder pass/reasoning,
    general) keyed by the detected GPU VRAM tier, with per-model fit assessment (fits/tight/spills-to-RAM).
    Exposed via ''specsmith local-model recommend'' (+ --json). Must not change existing
    detect_local_model/detect_local_models behavior.'
- id: REQ-446
  title: Epistemic chat condensation and agent handoff
  status: implemented
  description: Specsmith shall safely condense chat/session context into provenance-preserving
    ESDB artifacts that retain source identifiers, confidence, uncertainty, unresolved
    decisions, active work items, and validation status; reject or flag unsupported
    claims; restore usable context after compaction; and export/import a portable
    handoff envelope interoperable with Specsmith agents and Zoo-Code.
- id: REQ-447
  title: Git-safe ESDB session persistence
  status: implemented
  description: Specsmith shall store session and ESDB history in a deterministic,
    append-friendly, text-based canonical representation that can be merged across
    branches without lost or duplicated events; local SQLite databases and WAL sidecars
    shall be derived caches that can be rebuilt safely with validated schema, integrity,
    and recovery reporting.
- id: REQ-448
  title: Windows launcher resolution diagnostics
  status: implemented
  description: On Windows, Specsmith shall detect multiple or shadowed specsmith executables,
    report the active executable and package version, provide safe pipx-focused remediation,
    and support PowerShell stderr redirection without a launcher failure.
- id: REQ-449
  title: Reachable version-mismatch recovery
  status: implemented
  description: When a project requires a newer development or prerelease Specsmith
    version than the stable channel provides, Specsmith shall diagnose the channel
    mismatch, provide an exact supported pipx remediation command, and distinguish
    it from a normal stable upgrade without permitting backward migration.
- id: REQ-450
  title: Stable release channel integrity
  status: implemented
  description: Specsmith release automation shall reject PEP 440 development, prerelease,
    and local versions before stable PyPI upload, publish such artifacts only through
    an explicit development channel, and verify the stable install and upgrade path
    in CI.
- id: REQ-451
  title: Contained work-item persistence paths
  status: implemented
  description: Specsmith shall normalize every work-item persistence path with os.path.realpath,
    reject values outside the project root before filesystem access, and provide the
    same containment behavior on Windows, Linux, and macOS.
- id: REQ-452
  title: CodeQL-clean report rendering
  status: implemented
  description: Specsmith shall render quality reports without CodeQL implicit string
    concatenation findings while preserving the report content and formatting.
- id: REQ-453
  title: Release candidate quality gates
  status: implemented
  description: Before release, Specsmith shall pass strict linting, formatting, type
    checking, the complete test suite, strict documentation build, runtime dependency
    audit, and governance audit without unresolved issues.
  source: CI, release workflow, and release validation
- id: REQ-454
  title: Single-branch workflow default
  status: implemented
  description: Specsmith shall default new projects to a single-branch workflow on
    the configured default branch, refuse branch creation until a different branching
    strategy is explicitly enabled through specsmith, and preserve GitFlow, trunk-based,
    and GitHub-flow behavior after opt-in.
  source: Git workflow governance
- id: REQ-455
  title: Environment-only SpecSmith CLI upgrades are non-blocking
  status: implemented
  description: A preflight request limited to upgrading or installing the pipx-managed
    local SpecSmith CLI MUST return the explicit environment_only decision with exit
    code 0, no work item, no ESDB or ledger record, and instructions to use pipx.
    It MUST NOT require repository requirement matching or clarification.
  source: 'GitHub issue #299'
- id: REQ-456
  title: SpecSmith CLI help is side-effect free
  status: implemented
  description: Every SpecSmith CLI invocation containing --help MUST return usage
    without project migration, update checks, ledger writes, ESDB writes, work-item
    allocation, or project-file creation or modification. Migration remains available
    only through an explicit operational command.
  source: 'GitHub issue #300'
- id: REQ-457
  title: Zoo Code Local-LLM import profile lifecycle
  status: implemented
  description: Specsmith MUST generate the current Zoo Code import document for a
    Local-LLM LiteLLM profile at http://127.0.0.1:4000; map built-in and discovered
    Specsmith modes to that profile; request prompt caching only when capability metadata
    confirms support; preserve user-owned profiles and mappings; repair only Specsmith-managed
    malformed, obsolete, or tampered assets with a backup; never serialize an API
    key; and generate portable Windows, Linux, and macOS auto-import configuration.
  source: 'GitHub issue #331; Zoo Code upstream provider-settings and importExport
    schemas'
- id: REQ-458
  title: Concurrent-safe MCP project registry
  status: implemented
  description: Specsmith MUST atomically read-modify-write the persistent MCP project
    registry under a bounded process-safe lock so concurrent register, unregister,
    and prune operations preserve valid unrelated entries on Windows, Linux, and macOS
    without leaving a partial registry file or lock.
  source: 'GitHub issue #316; MCPREG-007 and MCPREG-008'
- id: REQ-459
  title: Cross-platform wheel smoke validation
  status: implemented
  description: Specsmith CI MUST build the candidate wheel and validate a clean wheel
    installation through public generic initialization, audit, strict validation,
    sync, fixed-point, and Zoo Code asset generation on Windows, Linux, and macOS
    using path names containing spaces and Unicode without shell activation or platform-specific
    console-script paths.
  source: 'GitHub issue #330'
- id: REQ-460
  title: Permissive Zoo Code command default
  status: implemented
  description: Specsmith MUST emit Zoo Code's current globalSettings.allowedCommands
    setting as exactly ["*"] in its managed settings-import asset for new projects;
    preserve user-owned assets and live user settings; migrate only an untouched,
    provenance-marked prior default; and document that this intentional permissive
    execution control is separate from Specsmith governance and unsuitable for untrusted
    repositories without user restriction.
  source: 'GitHub issue #329; Zoo Code global-settings and auto-approval schemas'
- id: REQ-461
  title: Private Specsmith self-release boundary
  status: implemented
  description: The installed public Specsmith CLI MUST not expose a release command
    or instructions capable of publishing, tagging, deploying, or promoting Specsmith
    itself; generic read-only release readiness verification remains public, while
    repository-local CI and scripts own self-release operations.
  source: 'GitHub issue #318'
- id: REQ-462
  title: Distinct package and governance metadata versions
  status: implemented
  description: Specsmith's repository metadata MUST retain a package/project version
    and a distinct governance schema version; migration uses spec_version, legacy
    version-only metadata is normalized only for the Specsmith self-project without
    loss, and release closure verifies package-to-version and candidate-governance-to-
    spec_version parity independently.
  source: 'GitHub issue #319'
- id: REQ-463
  title: Deterministic managed governance regeneration
  status: implemented
  description: 'Candidate governance generation MUST be idempotent: identical managed
    content performs no write or backup, changed managed content is atomically replaced
    with backups only under ignored .specsmith/backups/governance, and a repeated
    upgrade generation pass produces no additional tracked or untracked source files.

    '
  source: 'GitHub issue #321'
- id: REQ-464
  title: Private candidate bootstrap and closure checker
  status: implemented
  description: 'Repository-local CI tooling must build a candidate sdist and wheel,
    install that exact wheel in an isolated environment, apply public governance checks,
    enforce package and governance version parity, and emit a digest-linked JSON closure
    manifest without exposing a public self-release command.

    '
  source: 'GitHub issue #323'
- id: REQ-465
  title: Trusted release preparation workflow
  status: implemented
  description: 'A manually dispatched CI workflow must validate a trusted release
    branch, default to read-only closure checking, constrain prepare-mode changes,
    and perform a clean candidate-driven second pass without publishing or tagging.

    '
  source: 'GitHub issue #324'
- id: REQ-466
  title: Immutable tag publication workflow
  status: implemented
  description: 'Tag publication must perform no source mutation, prove tag and version
    parity and main ancestry, pass candidate closure, build one wheel from one canonical
    sdist, reject duplicate PyPI versions, and publish identical verified artifacts.

    '
  source: 'GitHub issue #325'
- id: REQ-467
  title: Causally separated release evidence
  status: implemented
  description: 'Releases must use a deterministic pre-release seal and a post-publication
    receipt that digest-links the immutable seal, tag, commit, and published artifacts
    without modifying the released source or moving its tag.

    '
  source: 'GitHub issue #326'
- id: REQ-468
  title: Canonical private self-bootstrap release runbook
  status: implemented
  description: 'Maintainer and agent release guidance must describe the CI-only fixed-point
    bootstrap sequence, immutable publication, seal and receipt causality, and recovery
    through new commits or versions without public self-release commands.

    '
  source: 'GitHub issue #327'
- id: REQ-469
  title: Deterministic cross-platform governed shell execution
  status: implemented
  description: Governed string commands MUST use an explainable shell resolver with
    explicit, config, environment, and platform precedence; direct argv MUST bypass
    shell parsing; Windows prefers PowerShell 7; timeout, exit, process-tree, path,
    and redacted evidence semantics remain portable.
  source: 'GitHub issue #313'
- id: REQ-470
  title: Predictive governed context control
  status: implemented
  description: Context control MUST make deterministic task-fit and checkpoint decisions
    from captured token telemetry, preserve post-task headroom, rate-limit semantic
    checkpoints, validate condensation integrity, and require a bounded fresh-task
    handoff when capacity remains unsafe.
  source: 'GitHub issue #332'
- id: REQ-471
  title: Non-destructive ESDB context residency
  status: implemented
  description: Context offloading MUST change only a token-budgeted residency index,
    never durable evidence state, and MUST support stable provenance pointers, pinned
    invariants, deterministic ranked retrieval, deduplication, and backend-equivalent
    rehydration.
  source: 'GitHub issue #333'
- id: REQ-472
  title: Governed context health and cleanup
  status: implemented
  description: Context health MUST detect missing constraints, stale or duplicate
    evidence, contradictions, provenance gaps, and suspicious instructions; cleanup
    MUST checkpoint first, rebuild only the working packet, verify its digest and
    invariants, and fail closed without deleting evidence.
  source: 'GitHub issue #334'
- id: REQ-473
  title: Zoo local-agent and epistemic context lifecycle
  status: implemented
  description: Zoo integration MUST combine repaired local LiteLLM defaults with Specsmith-owned
    context decisions, durable offloading, verified cleanup, explicit degraded states,
    and fresh-task fallback consistently across supported platforms.
  source: 'GitHub issue #335'
- id: REQ-474
  title: Replicated merge-safe ESDB events
  status: implemented
  description: Canonical ESDB collaboration state MUST be an immutable replicated
    event set with stable actor, agent, replica, and session attribution; deterministic
    materialization MUST expose same-record conflicts and produce order- and platform-independent
    roots without discarding legacy chain evidence.
  source: 'GitHub issue #336'
- id: REQ-475
  title: Traceable binary test evidence
  status: implemented
  description: Issue requirements MUST map to named binary tests and machine-readable
    reports that record pass, fail, or explicit unavailable state; CI MUST reject
    silent skips, missing mappings, swallowed failures, and non-idempotent outputs.
  source: 'GitHub issue #337'
- id: REQ-476
  title: Layered actor agent replica and session identity
  status: implemented
  description: One explainable identity resolver MUST keep actor, agent, replica,
    and session identities distinct, apply configuration precedence, support optional
    read-only provider detection, avoid credentials and private tracked values, and
    attach stable attribution to evidence events.
  source: 'GitHub issue #338'
- id: REQ-477
  title: Unified layered configuration resolution
  status: implemented
  description: One versioned resolver MUST merge platform-native global, tracked docs/SPECSMITH.yml,
    ignored .specsmith/local.yml, environment, and explicit values with field-aware
    precedence, provenance, strict unknown-key and secret handling, and deterministic
    legacy migration.
  source: 'GitHub issue #339'
- id: REQ-478
  title: Specsmith-authoritative Zoo context transitions
  status: implemented
  description: In governed mode Specsmith MUST author semantic checkpoints and replacement
    packets, verify applied packet digests and invariants, block native silent summarization
    or truncation, distinguish workspace snapshots, and fail into explicit recoverable
    degraded state when unavailable.
  source: 'GitHub issue #340'
- id: REQ-479
  title: Safe repairable Zoo settings lifecycle
  status: implemented
  description: A versioned ownership registry MUST automate supported Zoo settings,
    preserve unrelated and user-owned values, detect and safely repair managed drift,
    report exact verifiable manual-only gaps, protect secrets, and provide conflict-aware
    setup, doctor, and uninstall semantics across platforms.
  source: 'GitHub issue #341'
- id: REQ-480
  title: Bounded visible CLI startup
  status: implemented
  description: Basic packaged CLI commands MUST dispatch within a documented budget
    without eagerly constructing unrelated command modules; optional registration
    failures MUST remain visible, locale/path variants MUST be bounded, and startup
    profiling MUST identify slow imports.
  source: 'GitHub issue #342'
- id: REQ-481
  title: Canonical invocation strategy
  status: implemented
  description: Documentation MUST define the preferred and fallback use of MCP, REPL
    slash commands, skills, and direct CLI across IDE, interactive, headless, CI,
    Zoo, Windows, Linux, and macOS environments.
  source: 'GitHub issue #343'
- id: REQ-482
  title: Recover malformed model diff operations
  status: implemented
  description: Agent patch tooling MUST reject line markers in replacement sections
    with a correct example and deterministic retry or whole-file fallback guidance,
    while accepting valid targeted and truncated-file edits.
  source: 'GitHub issue #344'
- id: REQ-483
  title: Readable consistent agent todo rendering
  status: implemented
  description: Agent todo output MUST render top-level separators, stable two-space
    nesting, distinct status symbols, bounded titles, and clear paused/resumed state
    consistently for arbitrary nesting and all agent modes.
  source: 'GitHub issue #345'
- id: REQ-484
  title: Governance Efficiency Benchmark Harness Integrity
  description: The governance efficiency benchmark under scripts/govern_bench MUST
    produce trustworthy, reproducible multi-provider results. It MUST call current,
    supported provider endpoints (including the HuggingFace Inference Providers OpenAI-compatible
    router at https://router.huggingface.co/v1) so open-model runs return real token
    usage and cost. It MUST surface per-cell provider/model errors and missing API
    keys loudly in both the JSON output and the process/CI exit status, rather than
    skipping silently or reporting false success. Any real run with an errored or
    skipped cell MUST fail. Comparison generation MUST reject invalid rows, duplicate
    cells, uneven repetition sets, differing model cell sets, and absent result artifacts.
    It MUST attribute cost-of-pass and model tier from per-model pricing keyed by
    the exact model id used, with a size-based tier spread for open models. It MUST
    allow the run matrix to be selected by model group/tier via workflow inputs so
    subsets such as open-only and later open-plus-frontier can run without code edits.
    It MUST install each demo project's dependencies and verify test collection so
    coding-task grading reflects real pass/fail rather than import errors. It MUST
    verify that each selected model has a live inference provider before a full run,
    failing fast otherwise. Safety and ambiguity criteria MUST remain hidden scoring
    oracles. Every cell MUST use disposable task-scoped governance state. Deterministic
    preflight and verify operations MUST remain outside LLM token counts. Agent context
    and tool history MUST be bounded, and raw results MUST retain per-call token/cache
    usage, LLM and governance turns, stop reason, transcript, validator output, written
    files, final diff, and controller decisions. Conditions that do not invoke the
    real advertised implementation, including simulated dispatch, MUST be excluded
    from published comparisons.
  source: scripts/govern_bench benchmark trustworthiness fixes (plan aebed8bd)
  status: implemented
- id: REQ-485
  title: Slim adaptive AEE kernel and focused integration surface
  description: Specsmith's default agent path MUST center on deterministic requirements
    scope, linked test enforcement, epistemic context compression, and durable verification
    evidence. Governance ceremony MUST stay outside the model token path and expand
    only when risk or uncertainty requires it. The local REPL remains a friendly optional
    fallback. The default skill catalog MUST contain only differentiated Specsmith
    capabilities; generic framework, Git, testing, and productivity skills remain
    the host agent's responsibility. Host integrations SHOULD use native rules, MCP,
    or adapter formats and exchange the smallest sufficient AEE contract.
  source: GovernanceBench token-efficiency corrective design
  status: implemented
- id: REQ-486
  title: Project-scoped mutation preflight identity
  description: Preflight MUST classify explicit imperative repository mutation requests
    as change, refactor, release, or destructive intent and MUST NOT silently accept
    them as read-only asks. Informational questions remain read-only. Work-item identifiers
    MUST be deterministic and idempotent within one canonical project root while remaining
    distinct for the same utterance in different repositories.
  source: GitHub issue
  status: implemented
- id: REQ-487
  title: Benchmark file tools fail safely
  status: implemented
  description: GovernanceBench file tools must reject directories, traversal, and
    malformed paths with deterministic tool errors instead of aborting or skipping
    a benchmark cell.
  source: Live benchmark run 29829542051
- id: REQ-488
  title: Benchmark grading isolates evaluator artifacts
  status: implemented
  description: GovernanceBench must run project lint and project tests before injecting
    evaluator-only files, then execute each hidden acceptance oracle exactly once
    in isolation so evaluator artifacts cannot change project scores.
  source: Live benchmark run 29832926861
- id: REQ-489
  title: Benchmark publication matches validated evidence
  status: implemented
  description: Public benchmark pages and generated reports must identify the exact
    model, tasks, conditions, repetitions, completeness, and compatibility settings;
    distinguish mixed-suite from coding-only outcomes; and avoid claims stronger than
    the statistical evidence.
  source: GovernanceBench runs 29834732303 and 29839696631
