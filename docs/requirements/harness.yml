# specsmith requirements — harness
# CANONICAL SOURCE: edit this file, not docs/REQUIREMENTS.md
# docs/REQUIREMENTS.md is regenerated from these YAML files.
#
# Schema: id (REQ-NNN), title, description, source, status
# Required fields: id, title, status
- id: REQ-130
  title: Typed ProjectOperations Layer
  description: All tool handlers MUST use a typed `ProjectOperations` class for file,
    git/VCS, and search operations. Direct raw shell string assembly in tool handlers
    is prohibited.
  source: docs/PLANNED-REQUIREMENTS.md (OPS-001)
  status: defined
- id: REQ-131
  title: ProjectOperations File Operations via pathlib
  description: '`ProjectOperations` MUST expose file operations (`read_file`, `write_file`,
    `list_dir`, `glob`, `search`) implemented via Python `pathlib`/`stdlib` — no subprocess
    calls.'
  source: docs/PLANNED-REQUIREMENTS.md (OPS-002)
  status: defined
- id: REQ-132
  title: ProjectOperations Git/VCS Operations
  description: '`ProjectOperations` MUST expose git/VCS operations (`status`, `log`,
    `diff`, `add`, `commit`, `push`, `create_branch`, `create_pr`) returning structured
    result objects.'
  source: docs/PLANNED-REQUIREMENTS.md (OPS-003)
  status: defined
- id: REQ-133
  title: ProjectOperations Typed Result Objects
  description: All `ProjectOperations` methods MUST return a typed result containing
    at minimum `exit_code`, `stdout`, `stderr`, and `elapsed_ms`.
  source: docs/PLANNED-REQUIREMENTS.md (OPS-004)
  status: defined
- id: REQ-134
  title: executor.py run_tracked Preserved as Narrow Fallback
  description: The existing `executor.py` `run_tracked()` function MUST be preserved
    as a narrow fallback for commands that have no Python equivalent.
  source: docs/PLANNED-REQUIREMENTS.md (OPS-005)
  status: defined
- id: REQ-135
  title: ProjectOperations Cross-Platform
  description: '`ProjectOperations` MUST be cross-platform (Windows, Linux, macOS)
    without platform-specific code branches in call sites.'
  source: docs/PLANNED-REQUIREMENTS.md (OPS-006)
  status: defined
- id: REQ-136
  title: Harness Slash Commands Package
  description: The `commands/` package MUST implement all priority harness slash commands
    available inside `specsmith run`.
  source: docs/PLANNED-REQUIREMENTS.md (CMD-001)
  status: defined
- id: REQ-137
  title: Session Management Slash Commands
  description: 'Session management commands MUST include: `/model`, `/provider`, `/tier`,
    `/status`, `/save`, `/clear`, `/compact`, `/export`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-002)
  status: defined
- id: REQ-138
  title: Multi-Agent Slash Commands
  description: 'Multi-agent commands MUST include: `/spawn`, `/team`, `/team-status`,
    `/worktree`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-003)
  status: defined
- id: REQ-139
  title: Continuous Learning Slash Commands
  description: 'Continuous learning commands MUST include: `/learn`, `/learn-eval`,
    `/instinct-status`, `/instinct-import`, `/instinct-export`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-004)
  status: defined
- id: REQ-140
  title: Evaluation Slash Commands
  description: 'Evaluation commands MUST include: `/eval define`, `/eval run`, `/eval
    report`, `/eval compare`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-005)
  status: defined
- id: REQ-141
  title: Orchestration Slash Commands
  description: 'Orchestration commands MUST include: `/multi-plan`, `/multi-execute`,
    `/route`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-006)
  status: defined
- id: REQ-142
  title: Hook Control Slash Commands
  description: 'Hook control commands MUST include: `/hooks-enable`, `/hooks-disable`,
    `/hook-profile`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-007)
  status: defined
- id: REQ-143
  title: MCP Slash Commands
  description: 'MCP commands MUST include: `/mcp-list`, `/mcp-add`, `/mcp-configure`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-008)
  status: defined
- id: REQ-144
  title: Security Slash Commands
  description: 'Security commands MUST include: `/security-scan`, `/audit-prompt`.'
  source: docs/PLANNED-REQUIREMENTS.md (CMD-009)
  status: defined
- id: REQ-145
  title: AgentTool for Subagent Spawning
  description: The runner MUST provide an `AgentTool` (TaskTool) as a native LLM-callable
    tool that spawns subagent instances.
  source: docs/PLANNED-REQUIREMENTS.md (MAS-001)
  status: defined
- id: REQ-146
  title: Hub-and-Spoke and Agent-Teams Coordination
  description: Subagent spawning MUST support hub-and-spoke and agent-teams (peer-to-peer
    via filesystem mailbox) coordination modes.
  source: docs/PLANNED-REQUIREMENTS.md (MAS-002)
  status: defined
- id: REQ-147
  title: Filesystem Mailbox for Agent Teams
  description: The filesystem mailbox for agent teams MUST be stored at `.specsmith/teams/{team}/mailbox/{agent}.json`.
  source: docs/PLANNED-REQUIREMENTS.md (MAS-003)
  status: defined
- id: REQ-148
  title: Git Worktree Isolation for Subagents
  description: When `isolation=worktree`, the spawner MUST create a git worktree at
    `.specsmith/worktrees/{agent_id}/`.
  source: docs/PLANNED-REQUIREMENTS.md (MAS-004)
  status: defined
- id: REQ-149
  title: No Recursive Subagent Nesting
  description: Subagents MUST NOT be able to spawn further subagents (no recursive
    nesting).
  source: docs/PLANNED-REQUIREMENTS.md (MAS-005)
  status: defined
- id: REQ-150
  title: Distilled Summary from Subagents
  description: The parent agent MUST receive a distilled summary from each subagent
    on completion, not the full transcript.
  source: docs/PLANNED-REQUIREMENTS.md (MAS-006)
  status: defined
- id: REQ-151
  title: Agent Teams Feature Flag Gated
  description: Agent team mode MUST be gated behind a feature flag (`SPECSMITH_AGENT_TEAMS=1`).
  source: docs/PLANNED-REQUIREMENTS.md (MAS-007)
  status: defined
- id: REQ-152
  title: Orchestrator Meta-Agent for Routing
  description: specsmith MUST provide an orchestrator meta-agent for task classification,
    routing, and optimization — not execution.
  source: docs/PLANNED-REQUIREMENTS.md (ORC-001)
  status: defined
- id: REQ-153
  title: Orchestrator Defaults to Local Ollama
  description: The orchestrator MUST default to a small local Ollama model so orchestration
    incurs zero cloud API cost.
  source: docs/PLANNED-REQUIREMENTS.md (ORC-002)
  status: defined
- id: REQ-154
  title: Agent Registry with Capability Metadata
  description: The orchestrator MUST maintain an agent registry with type, model,
    provider, cost_tier, capabilities, avg_latency_ms, confidence.
  source: docs/PLANNED-REQUIREMENTS.md (ORC-003)
  status: defined
- id: REQ-155
  title: Orchestrator Emits One Structured Next-Action
  description: The orchestrator MUST emit exactly one structured next-action per task.
  source: docs/PLANNED-REQUIREMENTS.md (ORC-004)
  status: defined
- id: REQ-156
  title: Cost-Aware Routing
  description: The orchestrator MUST route cheap tasks to Ollama workers and complex
    tasks to cloud providers.
  source: docs/PLANNED-REQUIREMENTS.md (ORC-005)
  status: defined
- id: REQ-157
  title: Post-Session Self-Evaluation for Routing Thresholds
  description: The orchestrator MUST run a post-session self-evaluation to update
    routing thresholds.
  source: docs/PLANNED-REQUIREMENTS.md (ORC-006)
  status: defined
- id: REQ-158
  title: Feature Flag System for Tool Schema Visibility
  description: specsmith MUST implement a feature-flag system controlling which tool
    schemas are sent to the LLM.
  source: docs/PLANNED-REQUIREMENTS.md (FLG-001)
  status: defined
- id: REQ-159
  title: Feature Flags via Environment and scaffold.yml
  description: Feature flags MUST be configurable via environment variables and `scaffold.yml`
    under `agent.flags`.
  source: docs/PLANNED-REQUIREMENTS.md (FLG-002)
  status: defined
- id: REQ-160
  title: Agent Teams and Advanced Features Flag-Gated
  description: Agent teams, worktree isolation, KAIROS daemon mode, security scanner,
    and MCP tools MUST be flag-gated.
  source: docs/PLANNED-REQUIREMENTS.md (FLG-003)
  status: defined
