- id: REQ-484
  title: Governance Efficiency Benchmark Harness Integrity
  description: >-
    The governance efficiency benchmark under scripts/govern_bench MUST produce
    trustworthy, reproducible multi-provider results. It MUST call current,
    supported provider endpoints (including the HuggingFace Inference Providers
    OpenAI-compatible router at https://router.huggingface.co/v1) so open-model
    runs return real token usage and cost. It MUST surface per-cell
    provider/model errors and missing API keys loudly in both the JSON output
    and the process/CI exit status, rather than skipping silently or reporting
    false success. Any real run with an errored or skipped cell MUST fail.
    Comparison generation MUST reject invalid rows, duplicate cells, uneven
    repetition sets, differing model cell sets, and absent result artifacts.
    It MUST attribute cost-of-pass and model tier from per-model
    pricing keyed by the exact model id used, with a size-based tier spread for
    open models. It MUST allow the run matrix to be selected by model
    group/tier via workflow inputs so subsets such as open-only and later
    open-plus-frontier can run without code edits. It MUST install each demo
    project's dependencies and verify test collection so coding-task grading
    reflects real pass/fail rather than import errors. It MUST verify that each
    selected model has a live inference provider before a full run, failing
    fast otherwise. Safety and ambiguity criteria MUST remain hidden scoring
    oracles. Every cell MUST use disposable task-scoped governance state.
    Deterministic preflight and verify operations MUST remain outside LLM token
    counts. Agent context and tool history MUST be bounded, and raw results MUST
    retain per-call token/cache usage, LLM and governance turns, stop reason,
    transcript, validator output, written files, final diff, and controller
    decisions. Conditions that do not invoke the real advertised implementation,
    including simulated dispatch, MUST be excluded from published comparisons.
  source: scripts/govern_bench benchmark trustworthiness fixes (plan aebed8bd)
  status: implemented
- id: REQ-485
  title: Slim adaptive AEE kernel and focused integration surface
  description: >-
    Specsmith's default agent path MUST center on deterministic requirements scope,
    linked test enforcement, epistemic context compression, and durable verification
    evidence. Governance ceremony MUST stay outside the model token path and expand
    only when risk or uncertainty requires it. The local REPL remains a friendly
    optional fallback. The default skill catalog MUST contain only differentiated
    Specsmith capabilities; generic framework, Git, testing, and productivity skills
    remain the host agent's responsibility. Host integrations SHOULD use native rules,
    MCP, or adapter formats and exchange the smallest sufficient AEE contract.
  source: GovernanceBench token-efficiency corrective design
  status: implemented
- id: REQ-486
  title: Project-scoped mutation preflight identity
  description: >-
    Preflight MUST classify explicit imperative repository mutation requests as
    change, refactor, release, or destructive intent and MUST NOT silently accept
    them as read-only asks. Informational questions remain read-only. Work-item
    identifiers MUST be deterministic and idempotent within one canonical project
    root while remaining distinct for the same utterance in different repositories.
  source: GitHub issue #357
  status: implemented
