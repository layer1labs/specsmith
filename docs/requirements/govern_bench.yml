- id: REQ-484
  title: Governance Efficiency Benchmark Harness Integrity
  description: >-
    The governance efficiency benchmark under scripts/govern_bench MUST produce
    trustworthy, reproducible multi-provider results. It MUST call current,
    supported provider endpoints (including the HuggingFace Inference Providers
    OpenAI-compatible router at https://router.huggingface.co/v1) so open-model
    runs return real token usage and cost. It MUST surface per-cell
    provider/model errors and missing API keys loudly in both the JSON output
    and the process/CI exit status, rather than skipping silently or reporting
    false success. Any real run with an errored or skipped cell MUST fail.
    Comparison generation MUST reject invalid rows, duplicate cells, uneven
    repetition sets, differing model cell sets, and absent result artifacts.
    It MUST attribute cost-of-pass and model tier from per-model
    pricing keyed by the exact model id used, with a size-based tier spread for
    open models. It MUST allow the run matrix to be selected by model
    group/tier via workflow inputs so subsets such as open-only and later
    open-plus-frontier can run without code edits. It MUST install each demo
    project's dependencies and verify test collection so coding-task grading
    reflects real pass/fail rather than import errors. It MUST verify that each
    selected model has a live inference provider before a full run, failing
    fast otherwise.
  source: scripts/govern_bench benchmark trustworthiness fixes (plan aebed8bd)
  status: implemented
