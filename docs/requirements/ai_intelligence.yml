- id: REQ-263
  title: HuggingFace Open LLM Leaderboard Sync
  description: specsmith MUST implement `src/specsmith/agent/hf_leaderboard.py` that
    fetches model benchmark data from the HuggingFace Datasets Server (`datasets-server.huggingface.co/rows?dataset=open-llm-leaderboard/contents`).
    The sync MUST be paginated (100 rows/page) and persist results to `~/.specsmith/model_scores.json`
    under a `bucket_scores` key.
  source: ARCHITECTURE.md ┬¦21 [HF-001]
  status: defined
- id: REQ-264
  title: HF Leaderboard Rate-Limit Handling
  description: 'The HF leaderboard sync MUST handle HTTP 429 with exponential-backoff
    retry (up to 4 attempts). It MUST parse the `RateLimit: "api";r=X;t=Y` header
    to extract the exact reset window and wait accordingly. A +1 s safety margin MUST
    be added to the `t=` value.'
  source: ARCHITECTURE.md ┬¦21 [HF-002]
  status: defined
- id: REQ-265
  title: HF API Token Support
  description: 'When `SPECSMITH_HF_TOKEN` or `hf_api_token` is configured, the HF
    sync MUST include an `Authorization: Bearer <token>` header. The CLI `specsmith
    model-intel test-hf` MUST validate the token via `huggingface.co/api/whoami-v2`
    and report whether the Datasets Server is reachable.'
  source: ARCHITECTURE.md ┬¦21 [HF-003]
  status: defined
- id: REQ-266
  title: HF Leaderboard Static Fallback
  description: When HF is unreachable (network error, 5xx, or zero parseable rows),
    specsmith MUST load built-in static benchmark scores covering at least 40 models
    (OpenAI GPT-4o/mini, Claude 3.5 sonnet/haiku, Gemini 2.x, Mistral, Qwen, Llama,
    DeepSeek, Phi). The fallback MUST be transparent to callers.
  source: ARCHITECTURE.md ┬¦21 [HF-004]
  status: defined
- id: REQ-267
  title: Bucket Scoring Engine
  description: 'specsmith MUST compute three task-bucket scores from raw benchmark
    values (0ŌĆō100 scale): Reasoning = 0.35├ŚMATH + 0.30├ŚGPQA + 0.25├ŚBBH + 0.10├ŚIFEval;
    Conversational = 0.40├ŚIFEval + 0.35├ŚMMLU-PRO + 0.25├ŚBBH; Longform = 0.35├ŚMUSR
    + 0.35├ŚIFEval + 0.30├ŚMMLU-PRO. Scores MUST be rounded to 2 decimal places.'
  source: ARCHITECTURE.md ┬¦22 [BKT-001]
  status: defined
- id: REQ-268
  title: Model Intelligence Recommendations
  description: '`specsmith model-intel recommendations [--bucket reasoning|conversational|longform]`
    MUST return the top-10 models sorted by the requested bucket score. The governance
    HTTP server MUST expose `GET /api/model-intel/recommendations?bucket=<name>` returning
    the same data.'
  source: ARCHITECTURE.md ┬¦22 [BKT-002]
  status: defined
- id: REQ-269
  title: Model Intelligence CLI Commands
  description: 'specsmith MUST provide a `model-intel` CLI group with subcommands:
    `sync` (run HF sync), `scores [--model NAME]` (list/get cached scores), `recommendations
    [--bucket NAME]` (top-10 per bucket), `test-hf` (connectivity probe). All commands
    MUST support `--json` flag.'
  source: ARCHITECTURE.md ┬¦21 [HF-005]
  status: defined
- id: REQ-270
  title: Model Capability Profiles
  description: specsmith MUST implement `src/specsmith/agent/model_profiles.py` with
    a `ModelProfile` TypedDict containing `max_tokens`, `temperature`, `ctx_budget`,
    `action_capable`, `prompt_style` fields. A `get_profile(model)` function MUST
    resolve by prefix matching (longest key first) over Ōēź40 known models.
  source: ARCHITECTURE.md ┬¦23 [PRF-001]
  status: defined
- id: REQ-271
  title: Context History Trimmer
  description: '`trim_history(messages, budget_chars)` in `model_profiles.py` MUST
    trim conversation history to fit within `budget_chars`. Oldest turns MUST be summarised
    into a compact `[Earlier conversation summary ŌĆö N turns condensed]` assistant
    message rather than silently dropped. System messages MUST always be preserved.'
  source: ARCHITECTURE.md ┬¦23 [PRF-002]
  status: defined
- id: REQ-272
  title: AI Model Pacer EMA Utilisation
  description: The `ModelRateLimitScheduler` MUST track RPM and TPM utilisation as
    exponentially-weighted moving averages (alpha=0.25) and expose them in `snapshot()`
    as `rpm_ema` and `tpm_ema` fields.
  source: ARCHITECTURE.md ┬¦24 [PCR-001]
  status: defined
- id: REQ-273
  title: AI Model Pacer Adaptive Concurrency
  description: '`on_rate_limit(model, error, attempt)` MUST decrease `dynamic_concurrency`
    by 1 (minimum=1) and set `reduced_until` to now+120 s. Concurrency MUST restore
    incrementally (1 step per 60 s) once `reduced_until` has passed. The method MUST
    return a float delay for the caller to sleep.'
  source: ARCHITECTURE.md ┬¦24 [PCR-002]
  status: defined
- id: REQ-274
  title: AI Model Pacer Image Token Estimation
  description: '`estimate_request_tokens()` MUST accept an `image_count` parameter
    and include `image_count ├Ś image_token_estimate` tokens in the reservation. The
    default `image_token_estimate` MUST be 4096.'
  source: ARCHITECTURE.md ┬¦24 [PCR-003]
  status: defined
- id: REQ-275
  title: Multi-Provider LLM Client with Fallback
  description: specsmith MUST implement `src/specsmith/agent/llm_client.py` with a
    `LLMProvider` ABC and `LLMClient` that tries providers in order, falling back
    on HTTP 401/403/429/5xx. Concrete providers MUST cover Mistral, OpenAI, Google
    Gemini, and Ollama. A `MockProvider` MUST be available for tests.
  source: ARCHITECTURE.md ┬¦25 [LLM-001]
  status: defined
- id: REQ-276
  title: LLM Client O-Series Translation
  description: When the model name starts with `o1`, `o3`, or `o4`, or contains `-o1-`/`-o3-`/`-o4-`,
    the LLM client MUST use `max_completion_tokens` instead of `max_tokens`, force
    temperature to 1, and rename `system` role messages to `developer`.
  source: ARCHITECTURE.md ┬¦25 [LLM-002]
  status: defined
- id: REQ-277
  title: LLM Client vLLM Guided-JSON Mode
  description: 'When a JSON schema is provided and the provider type is `byoe` or
    `huggingface`, the request MUST include `guided_json` and `chat_template_kwargs:
    {"enable_thinking": false}` to suppress chain-of-thought tokens and enforce structured
    output.'
  source: ARCHITECTURE.md ┬¦25 [LLM-003]
  status: defined
- id: REQ-278
  title: Endpoint Preset Registry
  description: '`src/specsmith/agent/provider_registry.py` MUST export `ENDPOINT_PRESETS`
    ŌĆö a list of built-in connection presets for at least: vLLM (localhost:8000), LM
    Studio (localhost:1234), llama.cpp (localhost:8080), OpenRouter, Together AI,
    Groq, Fireworks, DeepInfra, Perplexity, and Azure OpenAI. Each preset MUST include
    `id`, `label`, `base_url`, `endpoint_kind`, and `needs_key`.'
  source: ARCHITECTURE.md ┬¦26 [PRE-001]
  status: defined
- id: REQ-279
  title: Endpoint Probe Enriched Metadata
  description: '`probe_openai_compatible()` MUST return a `models_detail` list where
    each entry includes `id`, `owner`, `context_length` (from `max_model_len` on vLLM,
    `context_length` or `context_window` otherwise), and `description`. The cap MUST
    be 200 models.'
  source: ARCHITECTURE.md ┬¦26 [PRE-002]
  status: defined
- id: REQ-280
  title: Suggested Profile Generation
  description: '`specsmith agent suggest-profiles` MUST inspect available backends
    (cloud env vars, installed Ollama models, saved BYOE endpoints) and propose ready-to-add
    `ProviderEntry` suggestions with role-tuned temperature and max_tokens for the
    reasoning/conversational/longform AEE buckets. Suggestions MUST be inert (not
    auto-saved).'
  source: ARCHITECTURE.md ┬¦27 [SGP-001]
  status: defined
