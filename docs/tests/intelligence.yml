  confidence: 1.0
- id: TEST-210
  title: Emergency Kill-Switch and Circuit-Breaker
  description: 'specsmith MUST implement an emergency kill-switch that immediately
    halts agent activity when: (a) the user invokes a stop command, (b) an anomaly
    detector triggers, or (c) the retry budget is exhausted. The kill-switch MUST
    be reachable from both the CLI and the REST API. Satisfies EU AI Act Art. 14 (human
    oversight), NIST AI RMF.'
  requirement_id: REQ-210
  type: compliance
  verification_method: evaluator
  input: {}
  expected_behavior: {}
  confidence: 1.0
