- id: TEST-206
  title: Tamper-Evident Agent Action Log
  description: specsmith MUST maintain a tamper-evident, append-only agent action
    log capturing every governance decision, tool invocation, input, and output. The
    log chain MUST use SHA-256 chaining so any modification is detectable. Satisfies
    EU AI Act Art. 12 (logging obligations) and NIST AI RMF (GO-6).
  requirement_id: REQ-206
  type: compliance
  verification_method: evaluator
  input: {}
  expected_behavior: {}
  confidence: 1.0
