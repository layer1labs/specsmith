  type: compliance
  verification_method: evaluator
  input: {}
  expected_behavior: {}
  confidence: 1.0
- id: TEST-218
  title: Self-Optimization Bounded by Iteration Budget
  description: All self-improvement loops (agent improve, eval harness, continuous
    learning) MUST be bounded by a configurable iteration budget. Unbounded recursion
    or runaway optimisation MUST be prevented. Satisfies EU AI Act systemic risk controls
    (GPAISR) and credit spend governance.
  requirement_id: REQ-218
  type: compliance
  verification_method: evaluator
  input: {}
  expected_behavior: {}
  confidence: 1.0
