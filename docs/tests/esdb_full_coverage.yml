- id: TEST-410
  title: M008 ESDB Full-Coverage Backfill Migration — idempotent
  description: >
    M008 applied to a project with workitems.json backfills all WIs as kind="work_item"
    ESDB records. Re-running M008 is idempotent (skips silently via marker file).
    Dry-run mode reports counts but writes nothing. Rollback removes the marker file.
    Terminal WIs map to ESDB status=tombstone; open/implemented map to active.
  requirement_id: REQ-401
  type: unit
  verification_method: >
    pytest (tests/test_esdb_writer.py::test_m008_backfills_workitems,
    tests/test_esdb_writer.py::test_m008_is_idempotent,
    tests/test_esdb_writer.py::test_m008_dry_run_no_writes,
    tests/test_esdb_writer.py::test_m008_rollback_removes_marker)
  input: {}
  expected_behavior: {}
  confidence: 1.0

