- id: TEST-321
  title: Orchestrator Is Sole Dispatch Entry Point
  description: The Orchestrator source MUST document REQ-321 and the sole-entry-point
    constraint. Worker agents MUST NOT expose a public method to initiate dispatches.
  requirement_id: REQ-321
  type: unit
  verification_method: pytest
  input: inspect.getsource(orchestrator); check for REQ-321 and 'sole entry point'
  expected_behavior: Both strings present in source; no AgentDispatcher.run() call
    outside orchestrator
  confidence: 0.95
- id: TEST-322
  title: DAG Decomposition Before Worker Dispatch
  description: TaskDAGBuilder.build() decomposes task into a valid acyclic DAG.
    Cycles raise DAGValidationError before any worker starts. Single-node fallback
    used when no planner output is provided.
  requirement_id: REQ-322
  type: integration
  verification_method: pytest
  input: Build DAG from plan list; build DAG from JSON string; build with cycle; build
    with no planner output
  expected_behavior: Valid plan builds DAG; JSON string extracted and built; cycle
    raises DAGValidationError; no planner builds single-node fallback
  confidence: 1.0
- id: TEST-323
  title: TaskNode Must Carry Required Fields
  description: A TaskNode constructed with minimal args MUST default status=PENDING,
    context_in=[], context_out=None, result=None. to_dict() MUST include all required
    fields.
  requirement_id: REQ-323
  type: unit
  verification_method: pytest
  input: TaskNode(id=n, title=T, role=coder, depends_on=[dep])
  expected_behavior: All 8 REQ-323 fields populated with correct types and defaults
  confidence: 1.0
- id: TEST-324
  title: Concurrent Dispatch Bounded by max_workers
  description: AgentPool MUST return None when active_count >= max_workers, preventing
    over-dispatch. Pool with idle workers returns a reused agent without spawning.
  requirement_id: REQ-324
  type: unit
  verification_method: pytest
  input: Pool at capacity; pool with idle worker
  expected_behavior: acquire() returns None at cap; acquire() returns idle worker
    without spawning new agent
  confidence: 1.0
- id: TEST-325
  title: Fail-Forward BLOCKED Propagation
  description: When a node transitions to FAILED, all transitive dependents are marked
    BLOCKED while non-dependent siblings remain PENDING. all_terminal() returns True
    after full propagation of a single-dependency chain.
  requirement_id: REQ-325
  type: integration
  verification_method: pytest
  input: 4-node DAG; fail impl; check review=BLOCKED and test=PENDING
  expected_behavior: review BLOCKED; test unaffected; all_terminal() True after
    a+b fail+block
  confidence: 1.0
- id: TEST-326
  title: AgentPool Must Reuse Idle Workers
  description: After release(), a subsequent acquire() for the same role returns
    the previously released agent object without spawning a new one.
  requirement_id: REQ-326
  type: unit
  verification_method: pytest
  input: Insert sentinel into pool._idle['coder']; call acquire('coder')
  expected_behavior: acquire() returns sentinel; active_count increments; release()
    decrements count and returns sentinel to idle
  confidence: 1.0
- id: TEST-327
  title: ESDB Context Written on Node Completion
  description: AgentDispatcher calls _write_esdb_record on node completion and sets
    context_out. Downstream nodes receive context_in populated with predecessor record ID.
  requirement_id: REQ-327
  type: integration
  verification_method: pytest
  input: Single-node DAG with mocked worker; mock _write_esdb_record returning 'rec-xyz'
  expected_behavior: summary.completed[0].esdb_record_id == 'rec-xyz'; node.context_out
    set
  confidence: 0.9
- id: TEST-328
  title: DAG State Transitions Persisted as JSONL Events
  description: EventEmitter writes node_started, node_completed, node_failed, and
    dag_done events as JSONL to .specsmith/dispatch/<dag_id>/events.jsonl. The file
    is created before the first emit.
  requirement_id: REQ-328
  type: integration
  verification_method: pytest
  input: EventEmitter(tmp_path, 'dag-id'); emit node_started, node_completed, node_failed
  expected_behavior: events.jsonl exists immediately after construction; 3 JSONL
    lines with correct event_type values
  confidence: 1.0
- id: TEST-329
  title: Per-Node Governance Preflight Before Worker Start
  description: AgentDispatcher._governance_preflight() is called for each node before
    worker acquisition. A mock that raises _GovernanceBlockedError causes the node
    to transition to FAILED without calling _invoke_worker.
  requirement_id: REQ-329
  type: unit
  verification_method: pytest
  input: Single-node DAG; patch _governance_preflight to raise; mock _invoke_worker
  expected_behavior: _invoke_worker not called; node.status = FAILED; summary.failed
    contains node
  confidence: 0.9
- id: TEST-330
  title: DAG Run Must Be Resumable from Checkpoint
  description: EventEmitter.replay() returns all persisted events for a dag_id.
    dispatch retry command identifies FAILED/BLOCKED nodes from past events and
    re-executes only those nodes.
  requirement_id: REQ-330
  type: integration
  verification_method: pytest
  input: EventEmitter(tmp_path, dag); emit node_started+completed+dag_done; call
    EventEmitter.replay()
  expected_behavior: replay() returns 3 events in order; list_runs() includes dag_id
  confidence: 1.0
- id: TEST-331
  title: Dispatch CLI Group with run/status/list/retry
  description: specsmith dispatch --help lists run, status, list, retry. Each subcommand
    shows expected options. dispatch list on empty project exits 0. dispatch status
    with unknown dag_id exits 0.
  requirement_id: REQ-331
  type: cli
  verification_method: pytest
  input: CliRunner invoke dispatch --help; dispatch run --help; dispatch list; dispatch
    status --dag-id nonexistent
  expected_behavior: All exit 0; --help shows expected subcommands and options
  confidence: 1.0
