  confidence: 0.85
- id: TEST-333
  title: Kairos Gantt Timeline Strip
  description: GanttStrip renders one row per node with a time-proportional bar.
    Nodes with overlapping started_at/finished_at ranges show visual concurrency.
  requirement_id: REQ-333
  type: integration
  verification_method: evaluator
