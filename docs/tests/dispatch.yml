- id: TEST-334
  title: Kairos Per-Node Retry and Abort Controls
  description: ControlsPanel Retry button is enabled for FAILED/BLOCKED nodes and
    disabled for others. Abort button is enabled only for RUNNING nodes. Clicking
    calls the correct POST endpoint.
  requirement_id: REQ-334
  type: unit
  verification_method: evaluator
  input: ControlsPanel for each NodeStatus (Pending/Running/Completed/Failed/Blocked)
  expected_behavior: Retry enabled only for Failed/Blocked; Abort enabled only for
    Running; click invokes correct action callback
  confidence: 0.9
