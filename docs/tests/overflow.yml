# specsmith test cases — overflow
# CANONICAL SOURCE: edit this file, not docs/TESTS.md
# docs/TESTS.md is regenerated from these YAML files.
#
# Schema: id, title, description, requirement_id, type,
#         verification_method, input, expected_behavior, confidence
# Required fields: id, title, requirement_id
- id: TEST-300
  title: YAML-First Sync Reads YAML and Writes JSON + MD
  description: When `.specsmith/governance-mode` == `yaml` and docs/requirements/*.yml
    exist, `specsmith sync` reads from YAML files, writes .specsmith/ requirements.json
    + testcases.json, and regenerates docs/REQUIREMENTS.md + docs/TESTS.md. `specsmith
    sync --check` exits 0 after sync. In legacy mode (no governance-mode file), sync
    reads from REQUIREMENTS.md as before.
  requirement_id: REQ-300
  type: integration
  verification_method: pytest
  input: tmp_path with YAML files + governance-mode=yaml
  expected_behavior: JSON updated; REQUIREMENTS.md regenerated; sync --check exits
    0
  confidence: 1.0
- id: TEST-301
  title: validate --strict Enforces All 8 Schema Checks
  description: '`specsmith validate --strict --json` returns `{ok: true, strict_errors:
    0}` on a clean project. When a duplicate REQ ID is injected, strict_errors > 0
    and exit code is 1. When an untested REQ exists, strict_warnings > 0 but exit
    code is still 0. The `validate-strict` CI job runs this gate on every push.'
  requirement_id: REQ-301
  type: cli
  verification_method: pytest
  input: specsmith validate --strict --json; inject duplicate REQ; inject untested
    REQ
  expected_behavior: clean project exits 0 strict_errors=0; dup exits 1; untested
    exits 0 with warning
  confidence: 1.0
- id: TEST-302
  title: generate docs Renders YAML to REQUIREMENTS.md and TESTS.md
  description: '`specsmith generate docs --json` in YAML-first mode exits 0 and returns
    `{ok: true, reqs: N, tests: M}`. The regenerated docs/REQUIREMENTS.md contains
    a heading for each REQ in the YAML files. `--check` flag reports changes without
    writing.'
  requirement_id: REQ-302
  type: cli
  verification_method: pytest
  input: specsmith generate docs --json; specsmith generate docs --check --json
  expected_behavior: exits 0; ok=true; REQUIREMENTS.md updated; check exits 0 with
    dry_run=true
  confidence: 1.0
- id: TEST-303
  title: governance-mode Flag Controls YAML vs Markdown Authority
  description: '`is_yaml_mode(root)` returns True when `.specsmith/governance-mode`
    == `yaml` and False when the file is absent or contains `markdown`. `specsmith
    sync` uses YAML sources when yaml_mode=True and Markdown sources when False. The
    flag is preserved across specsmith upgrades.'
  requirement_id: REQ-303
  type: unit
  verification_method: pytest
  input: governance-mode = yaml; governance-mode absent; governance-mode = markdown
  expected_behavior: is_yaml_mode returns True/False/False respectively
  confidence: 1.0
- id: TEST-304
  title: Migration Script Is Idempotent
  description: 'Running `scripts/migrate_governance_to_yaml.py` twice produces the
    same result as running it once. After migration: docs/requirements/ and docs/tests/
    contain YAML files, .specsmith/governance-mode == `yaml`, and `specsmith sync
    --check` exits 0.'
  requirement_id: REQ-304
  type: integration
  verification_method: script
  input: scripts/migrate_governance_to_yaml.py run twice on same project
  expected_behavior: second run produces no changes; governance-mode=yaml; sync --check
    exits 0
  confidence: 1.0
- id: TEST-305
  title: ChronoStore WAL-Based ESDB Write Layer
  description: ChronoStore MUST append events as NDJSON with SHA-256 hash chaining
    to <project>/.chronomemory/events.wal. EsdbBridge.status() returns chain_valid=True
    after appending records.
  requirement_id: REQ-305
  type: integration
  verification_method: pytest
  input: ChronoStore(tmp_path) append 3 records; EsdbBridge(tmp_path).status()
  expected_behavior: WAL file exists with chained hashes; chain_valid=True
  confidence: 0.95
- id: TEST-306
  title: ESDB Must Be Per-Project
  description: "Two EsdbBridge instances on separate \tmp_path directories MUST have\
    \ independent .chronomemory/events.wal files; records from project A are not visible\
    \ in project B."
  requirement_id: REQ-306
  type: integration
  verification_method: pytest
  input: Two EsdbBridge instances on different tmp_path directories
  expected_behavior: Each project has independent WAL; no cross-contamination
  confidence: 0.95
- id: TEST-307
  title: Session State Must Survive Restart
  description: SessionStore MUST persist session context to .specsmith/session-state.json.
    A new SessionStore instance on the same path MUST load the saved state.
  requirement_id: REQ-307
  type: integration
  verification_method: pytest
  input: SessionStore(tmp_path) save; new SessionStore(tmp_path) load
  expected_behavior: Loaded state matches saved state; session-state.json exists
  confidence: 0.95
- id: TEST-308
  title: Context Orchestrator Tiered Auto-Optimization
  description: ContextOrchestrator.optimize(fill_pct=N) MUST apply the correct tier.
    Data on disk MUST NEVER be deleted at any tier.
  requirement_id: REQ-308
  type: integration
  verification_method: pytest
  input: optimize(65), optimize(82), optimize(88) on ContextOrchestrator(tmp_path)
  expected_behavior: Correct tier actions returned; no files deleted from disk
  confidence: 0.9
- id: TEST-309
  title: CI Automation Togglable Per Project
  description: CiManager.enable(platform=github, force=True) MUST generate CI workflow
    files and persist ci_automation_enabled=true to .specsmith/config.yml.
  requirement_id: REQ-309
  type: cli
  verification_method: pytest
  input: CiManager(tmp_path).enable(platform=github, force=True)
  expected_behavior: CI files generated; config.yml has ci_automation_enabled=true
  confidence: 0.9
- id: TEST-310
  title: OEA Anti-Hallucination Fields on ESDB Records
  description: ChronoRecord(kind=test, payload={}) with no OEA arguments MUST default
    all 7 OEA fields to safe non-blocking values.
  requirement_id: REQ-310
  type: unit
  verification_method: pytest
  input: ChronoRecord(kind=test, payload={}) inspect all 7 OEA fields
  expected_behavior: source_type=observed, confidence=1.0, evidence=[], is_hypothesis=False,
    recursion_depth=0
  confidence: 0.95
- id: TEST-311
  title: RAG Retrieval Must Filter by Confidence
  description: ESDB retrieval MUST exclude records with confidence < min_confidence.
    Records at exactly the threshold MUST be included.
  requirement_id: REQ-311
  type: unit
  verification_method: pytest
  input: Append records with confidence 0.3, 0.7, 0.9; query(min_confidence=0.7)
  expected_behavior: Only confidence >= 0.7 records returned; 0.3 excluded
  confidence: 0.9
- id: TEST-312
  title: Context Optimize Command
  description: "specsmith context optimize --fill-pct N --json MUST exit 0 and return\
    \ JSON with \tier, ctions, and \tokens_freed."
  requirement_id: REQ-312
  type: cli
  verification_method: pytest
  input: specsmith context optimize --fill-pct 65 --json --project-dir tmp
  expected_behavior: Exit 0; JSON contains tier, actions list, tokens_freed integer
  confidence: 0.9
- id: TEST-335
  title: specsmith test-ran Records Test Result in testcases.json
  description: >-
    Running `specsmith test-ran TEST-001 --result passed` on a project with a valid
    testcases.json MUST: (1) update last_result to 'passed' and set last_run_at to
    an ISO-8601 UTC timestamp; (2) transition status from pending to implemented;
    (3) write a ledger entry of type test-ran; (4) exit 0. Running with --result
    failed MUST set status to failing. Running with an unknown TEST-ID MUST exit 1.
    Running with --json MUST emit a valid JSON payload with ok, test_id, result,
    old_status, new_status, and recorded_at fields.
  requirement_id: REQ-335
  type: cli
  verification_method: pytest
  input: specsmith test-ran TEST-001 --result passed / failed / unknown-id / --json
  expected_behavior: >-
    testcases.json updated; status transitions correct; ledger entry written;
    exit codes correct; JSON output valid
  confidence: 0.95
