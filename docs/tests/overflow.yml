  confidence: 1.0
- id: TEST-422
  title: run_sweep Tombstones Expired session_metric Records
  description: Create a tmp project ESDB with 2 session_metric records with timestamp
    61 days ago and 1 record with timestamp today. Call run_sweep(tmp_root). Assert
    result.tombstoned==2, result.kinds_swept["session_metric"]==2. Assert the 2 old
    records are now tombstone status in ESDB. Assert the recent record is still active.
    Assert result.efficiency_refreshed==True.
  requirement_id: REQ-412
  type: unit
  verification_method: pytest
  input: 2 expired session_metric records + 1 fresh; run_sweep(root)
  expected_behavior: tombstoned==2; kinds_swept["session_metric"]==2; recent record
    still active
  confidence: 1.0
