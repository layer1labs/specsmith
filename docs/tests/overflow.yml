- id: TEST-340
  title: /specsmith REPL Handler Streams CLI Output
  description: >-
    In the Nexus REPL, entering `/specsmith status` MUST invoke `specsmith status`
    as a subprocess with shell=True, streaming output to the terminal (capture_output=False).
    `/specsmith` with no args MUST invoke `specsmith --help`. A subprocess timeout
    MUST print a timeout message without crashing the REPL loop. The REPL startup
    banner MUST contain the string '/specsmith'.
  requirement_id: REQ-340
  type: unit
  verification_method: pytest
  input: NEXUS_BANNER string; mock subprocess.run for /specsmith status; /specsmith with no args; timeout simulation
  expected_behavior: >-
    Banner contains '/specsmith'; subprocess called with correct args;
    timeout handled gracefully; REPL loop continues after error
  confidence: 0.9
