- id: TEST-343
  title: run_tracked Uses DEVNULL stdin and communicate with Timeout
  description: >-
    specsmith.executor.run_tracked MUST call subprocess.Popen with stdin=subprocess.DEVNULL
    and must call proc.communicate(timeout=N) not proc.wait(). On timeout, it MUST call
    proc.kill() then proc.communicate() to drain. Spawned PIDs MUST be tracked in
    .specsmith/pids/.
  requirement_id: REQ-343
  type: unit
  verification_method: pytest
  input: run_tracked(tmp_path, 'echo ok', timeout=10); mock subprocess.Popen
  expected_behavior: DEVNULL stdin; communicate called with timeout; PID file written
  confidence: 0.9
