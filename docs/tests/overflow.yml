- id: TEST-335
  title: specsmith test-ran Records Test Result in testcases.json
  description: >-
    Running `specsmith test-ran TEST-001 --result passed` on a project with a valid
    testcases.json MUST: (1) update last_result to 'passed' and set last_run_at to
    an ISO-8601 UTC timestamp; (2) transition status from pending to implemented;
    (3) write a ledger entry of type test-ran; (4) exit 0. Running with --result
    failed MUST set status to failing. Running with an unknown TEST-ID MUST exit 1.
    Running with --json MUST emit a valid JSON payload with ok, test_id, result,
    old_status, new_status, and recorded_at fields.
  requirement_id: REQ-335
  type: cli
  verification_method: pytest
  input: specsmith test-ran TEST-001 --result passed / failed / unknown-id / --json
  expected_behavior: >-
    testcases.json updated; status transitions correct; ledger entry written;
    exit codes correct; JSON output valid
  confidence: 0.95
- id: TEST-336
  title: specsmith save Performs Backup, Commit, and Push
  description: >-
    `specsmith save` on a project with pending governance changes MUST create a
    timestamped backup under .chronomemory/backup/, git-commit all changed files,
    and git-push to origin. With --json it MUST emit {backup_path, commit_hash,
    push_ok}. With no pending changes it MUST exit 0 with a 'nothing to commit' message.
    On push failure it MUST exit 1 with an informative error.
  requirement_id: REQ-336
  type: cli
  verification_method: pytest
  input: specsmith save [--json] on project with dirty governance files; repeat with clean repo
  expected_behavior: >-
    Backup created; git commit recorded; push attempted; exit 0 on success;
    --json payload valid; clean repo exits 0 with 'nothing to commit'
  confidence: 0.95
- id: TEST-337
  title: specsmith load Pulls Latest Governance State
  description: >-
    `specsmith load` MUST execute git-pull on the current branch and report files
    changed. With `--restore-backup` it MUST also restore the most recent backup from
    .chronomemory/backup/. With --json it MUST emit {pull_ok, files_changed, backup_restored}.
    On merge conflict git-pull it MUST exit 1 with the conflict details.
  requirement_id: REQ-337
  type: cli
  verification_method: pytest
  input: specsmith load [--restore-backup] [--json] on project with remote changes
  expected_behavior: >-
    git-pull executed; files_changed count correct; backup optionally restored;
    --json payload valid; conflict exits 1
  confidence: 0.9
- id: TEST-338
  title: specsmith_run Tool Normalises Slash-Command and Verb Shortcut Forms
  description: >-
    specsmith_run('/specsmith save') MUST execute `specsmith save`. specsmith_run('save')
    MUST execute `specsmith save`. specsmith_run('specsmith audit --strict') MUST
    execute `specsmith audit --strict`. specsmith_run('') MUST execute `specsmith --help`.
    specsmith_run MUST appear in AVAILABLE_TOOLS and build_tool_registry() and carry
    epistemic_claims listing side-effect categories.
  requirement_id: REQ-338
  type: unit
  verification_method: pytest
  input: specsmith_run('/specsmith save'); specsmith_run('save'); specsmith_run('specsmith audit --strict'); specsmith_run('')
  expected_behavior: >-
    All three input forms resolve to the correct specsmith subprocess call;
    empty input triggers --help; tool registered with correct metadata
  confidence: 0.95
- id: TEST-339
