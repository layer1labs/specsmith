watch_list:

  - id: eu-ai-liability-directive
    name: EU AI Liability Directive
    status: pending-eu-parliament
    notes: >-
      Proposed 2022; currently stalled.  Monitor EUR-Lex for progression.
      Will require coverage of AI system traceability for civil liability claims.

  - id: us-federal-ai-act
    name: US Federal AI Act
    status: proposed
    notes: >-
      Multiple draft bills in Congress (AI Foundation Model Transparency Act,
      AI Act of 2024, etc.).  None enacted as of June 2026.
      Monitor congress.gov and NIST for developments.

  - id: canada-aida
    name: Canada AIDA (Artificial Intelligence and Data Act)
    status: proposed
    notes: >-
      Part of Bill C-27 (Digital Charter Implementation Act, 2022).
      As of June 2026, Bill C-27 has not been enacted.

  - id: uk-ai-regulation
    name: UK AI Regulation (Pro-innovation approach)
    status: guidance-only
    notes: >-
      UK government issued AI regulation guidance (Mar 2023) but no
      binding legislation as of June 2026.  Monitor dsit.gov.uk.

  - id: iso-iec-42001
    name: ISO/IEC 42001:2023 (AI Management System)
    status: watch
    notes: >-
      Published Dec 2023.  Not a regulation but an international standard.
      Consider adding compliance mapping when enterprise users request it.
