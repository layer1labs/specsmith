# specsmith — AI Regulation Coverage Sentinel
#
# PURPOSE
# -------
# This file is the source of truth for which regulation versions and
# article counts specsmith has reviewed and claims to cover.
#
# CI ENFORCEMENT
# --------------
# tests/test_compliance_governance.py::TestRegulationFreshness reads this
# file and asserts that the article count in the code EXACTLY matches
# `article_count` here.  If a regulation's articles change in
# regulations.py, the test FAILS until this file is updated AND the
# review_notes are updated to document what changed.
#
# HOW TO UPDATE
# -------------
# 1.  Edit docs/compliance/regulations.py to add/modify articles.
# 2.  Update `article_count` and `last_reviewed` in this file.
# 3.  Fill in `review_notes` explaining what changed.
# 4.  Set `next_review_due` to ~6 months from `last_reviewed`.
# 5.  Open a GitHub issue if the change requires user action.
#
# REVIEW SCHEDULE
# ---------------
# Reviews MUST be scheduled when:
#   - effective_date approaches (within 3 months)
#   - A significant amendment or enforcement action is published
#   - The AI governance landscape shifts materially (e.g. new guidance)
#   - next_review_due is reached
#
# DISCLAIMER
# ----------
# These records track specsmith's internal coverage state only and do NOT
# constitute legal advice or a guarantee of compliance.  Regulations change
# frequently; always verify with qualified legal counsel.

# VS CODE INTEGRATION NOTE
# ------------------------
# Specsmith now includes VS Code integration for enhanced developer experience.
# The integration provides real-time compliance monitoring, project initialization,
# and code analysis capabilities directly within the IDE.

