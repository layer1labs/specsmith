# govern_bench model registry — single source of truth for the benchmark matrix.
#
# select_models.py reads this file and emits a GitHub Actions matrix
# ({"include": [...]}) filtered by --groups / --providers / --tiers / --models.
# bench.yml feeds that matrix into the run job, so adding or toggling a model
# is a data edit here — no workflow code changes required.
#
# Fields (all required):
#   label     short slug used for artifact names (bench-results-<label>.json)
#             and matrix display names — keep it filesystem/URL safe.
#   provider  one of: openai | anthropic | google | openai-compat | huggingface
#   model     EXACT model id passed to run_bench.py --model. For huggingface
#             this is the full HF repo id; it must match metrics.py pricing keys.
#   group     toggle bucket: open | openai | anthropic | google
#   tier      size/price tier. Open spread: open-small < open-mid < open-large
#             < open-xl. Closed tiers reuse: nano < mini < mid < frontier.
models:
  # ── Open models — size tier spread (smallest → largest) ────────────────
  # Run now with: groups=open
  - label: llama-3.1-8b
    provider: huggingface
    # Pin a tool-capable HF Inference Provider via the router's model:provider
    # syntax. Auto-routing selected a provider that rejects tools/tool_choice
    # (422 UNSUPPORTED_OPENAI_PARAMS); deepinfra reports supports_tools=true.
    model: meta-llama/Llama-3.1-8B-Instruct:deepinfra
    group: open
    tier: open-small
  - label: qwen3.6-35b
    provider: huggingface
    # The FP8 repository is not currently available through managed HF
    # Inference Providers. Pin the full-precision post-trained model to the
    # cheapest tool-capable live route for reproducible comparisons.
    model: Qwen/Qwen3.6-35B-A3B:deepinfra
    group: open
    tier: open-mid
  - label: llama-3.3-70b
    provider: huggingface
    model: meta-llama/Llama-3.3-70B-Instruct
    group: open
    tier: open-large
  - label: gpt-oss-120b
    provider: huggingface
    model: openai/gpt-oss-120b
    group: open
    tier: open-xl

  # ── Open models via a direct OpenAI-compatible provider (no HF credits) ─
  # Same four tiers as `open`, but provider=openai-compat so a full run never
  # touches the HuggingFace Inference Providers credit pool. Default model ids
  # are OpenRouter slugs; the run job points BENCH_OPENAI_BASE_URL at
  # https://openrouter.ai/api/v1 (override via repo variable) and authenticates
  # with BENCH_OPENAI_COMPAT_API_KEY. Swap the ids to target a different host.
  # Run with: groups=open-direct
  - label: llama-3.1-8b-direct
    provider: openai-compat
    model: meta-llama/llama-3.1-8b-instruct
    group: open-direct
    tier: open-small
  - label: qwen3.6-35b-direct
    provider: openai-compat
    model: qwen/qwen3.6-35b-a3b
    group: open-direct
    tier: open-mid
  - label: llama-3.3-70b-direct
    provider: openai-compat
    model: meta-llama/llama-3.3-70b-instruct
    group: open-direct
    tier: open-large
  - label: gpt-oss-120b-direct
    provider: openai-compat
    model: openai/gpt-oss-120b
    group: open-direct
    tier: open-xl

  # ── OpenAI frontier — toggle on later with groups=openai ───────────────
  - label: gpt-4o-mini
    provider: openai
    model: gpt-4o-mini
    group: openai
    tier: mini
  - label: gpt-4o
    provider: openai
    model: gpt-4o
    group: openai
    tier: mid
  - label: gpt-5.6-luna
    provider: openai
    model: gpt-5.6-luna
    group: openai
    tier: mini
  - label: gpt-5.6-terra
    provider: openai
    model: gpt-5.6-terra
    group: openai
    tier: mid
  - label: gpt-5.6-sol
    provider: openai
    model: gpt-5.6-sol
    group: openai
    tier: frontier

  # ── Anthropic — toggle on later with groups=anthropic ──────────────────
  - label: claude-haiku-4-5
    provider: anthropic
    model: claude-haiku-4-5
    group: anthropic
    tier: nano
  - label: claude-sonnet-4-5
    provider: anthropic
    model: claude-sonnet-4-5
    group: anthropic
    tier: mid
  - label: claude-opus-4-5
    provider: anthropic
    model: claude-opus-4-5
    group: anthropic
    tier: frontier

  # ── Google — toggle on later with groups=google ────────────────────────
  - label: gemini-3.5-flash
    provider: google
    model: gemini-3.5-flash
    group: google
    tier: nano
  - label: gemini-3.1-pro
    provider: google
    model: gemini-3.1-pro
    group: google
    tier: mid
