# govern_bench model registry — single source of truth for the benchmark matrix.
#
# select_models.py reads this file and emits a GitHub Actions matrix
# ({"include": [...]}) filtered by --groups / --providers / --tiers / --models.
# bench.yml feeds that matrix into the run job, so adding or toggling a model
# is a data edit here — no workflow code changes required.
#
# Fields (all required):
#   label     short slug used for artifact names (bench-results-<label>.json)
#             and matrix display names — keep it filesystem/URL safe.
#   provider  one of: openai | anthropic | google | openai-compat | huggingface
#   model     EXACT model id passed to run_bench.py --model. For huggingface
#             this is the full HF repo id; it must match metrics.py pricing keys.
#   group     toggle bucket: open | openai | anthropic | google
#   tier      size/price tier. Open spread: open-small < open-mid < open-large
#             < open-xl. Closed tiers reuse: nano < mini < mid < frontier.
models:
  # ── Open models — size tier spread (smallest → largest) ────────────────
  # Run now with: groups=open
  - label: llama-3.1-8b
    provider: huggingface
    # Pin a tool-capable HF Inference Provider via the router's model:provider
    # syntax. Auto-routing selected a provider that rejects tools/tool_choice
    # (422 UNSUPPORTED_OPENAI_PARAMS); deepinfra reports supports_tools=true.
    model: meta-llama/Llama-3.1-8B-Instruct:deepinfra
    group: open
    tier: open-small
  - label: qwen3.6-35b
    provider: huggingface
    # The FP8 repository is not currently available through managed HF
    # Inference Providers. Pin the full-precision post-trained model to the
    # live tool-capable route verified by probe_models.py on 2026-07-21.
    model: Qwen/Qwen3.6-35B-A3B:scaleway
    group: open
    tier: open-mid
  - label: llama-3.3-70b
    provider: huggingface
    model: meta-llama/Llama-3.3-70B-Instruct
    group: open
    tier: open-large
  - label: gpt-oss-120b
    provider: huggingface
    # DeepInfra emitted empty continuations after a valid tool call in governed
    # run 30077072490. Novita advertises tools + structured output; pin the
    # one-variable repair so repeated admissions do not change serving stacks.
    model: openai/gpt-oss-120b:novita
    group: open
    tier: open-xl

  # ── Qwen agentic-coding candidates (HF-routed, tool-capable) ───────────
  # Run as a focused experiment with: groups=open-qwen
  - label: qwen3-coder-next
    provider: huggingface
    # HF lists Novita as a managed tool-capable route. Qwen's model card
    # requires the qwen3_coder tool parser when self-hosting with vLLM/SGLang.
    model: Qwen/Qwen3-Coder-Next:novita
    group: open-qwen
    tier: open-large
  - label: qwen3-coder-480b
    provider: huggingface
    # Larger active capacity and structured-output support make this the
    # high-capability control for the lower-cost Coder-Next experiment.
    model: Qwen/Qwen3-Coder-480B-A35B-Instruct:novita
    group: open-qwen
    tier: open-xl
  - label: qwen3.6-35b-deepinfra
    provider: huggingface
    # Qwen3.6 is the strongest current small-active Qwen alternative in the
    # HF catalog. DeepInfra advertises both tool and structured-output support;
    # this isolates serving quality from the earlier Scaleway diagnostic.
    model: Qwen/Qwen3.6-35B-A3B:deepinfra
    group: open-qwen
    tier: open-mid

  # ── Current open frontier coding/agent candidates ─────────────────────
  # Probe all routes first with: groups=open-frontier, probe_only=true.
  # Paid diagnostics start at one matched T28 repetition and advance only
  # when the deterministic weakness audit returns repeat_screen.
  - label: kimi-k2.7-code
    provider: huggingface
    # Lowest-priced live HF route with tools + structured output on 2026-07-23.
    model: moonshotai/Kimi-K2.7-Code:deepinfra
    group: open-frontier
    tier: open-xl
  - label: glm-5.2
    provider: huggingface
    # One-million-token route with tools + structured output.
    model: zai-org/GLM-5.2:deepinfra
    group: open-frontier
    tier: open-xl
  - label: deepseek-v4-pro
    provider: huggingface
    # DeepInfra did not advertise tools; pin the live tool-capable Novita route.
    model: deepseek-ai/DeepSeek-V4-Pro:novita
    group: open-frontier
    tier: open-xl
  - label: minimax-m3
    provider: huggingface
    # Current low-cost long-horizon candidate with a one-million-token route.
    model: MiniMaxAI/MiniMax-M3:novita
    group: open-frontier
    tier: open-xl

  # ── Open models via a direct OpenAI-compatible provider (no HF credits) ─
  # Same four tiers as `open`, but provider=openai-compat so a full run never
  # touches the HuggingFace Inference Providers credit pool. Default model ids
  # are OpenRouter slugs; the run job points BENCH_OPENAI_BASE_URL at
  # https://openrouter.ai/api/v1 (override via repo variable) and authenticates
  # with BENCH_OPENAI_COMPAT_API_KEY. Swap the ids to target a different host.
  # Run with: groups=open-direct
  - label: llama-3.1-8b-direct
    provider: openai-compat
    model: meta-llama/llama-3.1-8b-instruct
    group: open-direct
    tier: open-small
  - label: qwen3.6-35b-direct
    provider: openai-compat
    model: qwen/qwen3.6-35b-a3b
    group: open-direct
    tier: open-mid
  - label: llama-3.3-70b-direct
    provider: openai-compat
    model: meta-llama/llama-3.3-70b-instruct
    group: open-direct
    tier: open-large
  - label: gpt-oss-120b-direct
    provider: openai-compat
    model: openai/gpt-oss-120b
    group: open-direct
    tier: open-xl

  # ── OpenAI frontier — toggle on later with groups=openai ───────────────
  - label: gpt-4o-mini
    provider: openai
    model: gpt-4o-mini
    group: openai
    tier: mini
  - label: gpt-4o
    provider: openai
    model: gpt-4o
    group: openai
    tier: mid
  - label: gpt-5.6-luna
    provider: openai
    model: gpt-5.6-luna
    group: openai
    tier: mini
  - label: gpt-5.6-terra
    provider: openai
    model: gpt-5.6-terra
    group: openai
    tier: mid
  - label: gpt-5.6-sol
    provider: openai
    # Chat Completions function tools require reasoning_effort=none. The
    # harness records this compatibility mode by commit and applies it equally
    # across every condition for this model.
    model: gpt-5.6-sol
    group: openai
    tier: frontier

  # ── Anthropic — toggle on later with groups=anthropic ──────────────────
  - label: claude-haiku-4-5
    provider: anthropic
    model: claude-haiku-4-5
    group: anthropic
    tier: nano
  - label: claude-sonnet-4-5
    provider: anthropic
    model: claude-sonnet-4-5
    group: anthropic
    tier: mid
  - label: claude-opus-4-5
    provider: anthropic
    model: claude-opus-4-5
    group: anthropic
    tier: frontier

  # ── Google — toggle on later with groups=google ────────────────────────
  - label: gemini-3.5-flash
    provider: google
    model: gemini-3.5-flash
    group: google
    tier: nano
  - label: gemini-3.1-pro
    provider: google
    model: gemini-3.1-pro
    group: google
    tier: mid
