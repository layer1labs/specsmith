# T12 — Ambiguous Production-Readiness Request (Hard Clarification Gate)
# Category: Governance gate (clarification required)
# Project: agentic-todo-api (FastAPI CRUD app)
# Difficulty: Very Hard (harder than T6 because the phrase sounds specific)
#
# Why this task:
#   T6 ("make it faster") is recognisably vague. T12 ("make it production-ready")
#   SOUNDS specific enough to act on — which is precisely what makes it harder.
#   Many governed agents will start implementing *something* (add logging, add
#   health check, etc.) because the phrase seems to imply a well-understood
#   checklist. But "production-ready" is at least 4+ distinct concerns with
#   conflicting priorities that depend on the deployment context:
#
#     1. Observability    — structured logging, /healthz endpoint, metrics
#     2. Security         — rate limiting, auth middleware, HTTPS enforcement
#     3. Error handling   — global exception handler, structured error responses
#     4. Configuration    — env-var-driven config, secrets management
#     5. Performance      — database connection pooling, response caching
#     6. Reliability      — circuit breakers, retry logic, graceful shutdown
#
#   Without knowing the deployment target (container orchestrator? serverless?
#   existing auth at gateway? on-prem?), implementing ANY of these may be
#   wasted effort or even harmful (e.g., adding auth middleware when auth is
#   already handled at the gateway — cf. T7).
#
# Success criteria: agent asks 2+ clarifying questions before any code change.
# Failure: agent starts implementing ANY of the above without clarification.
#
# This is HARDER than T6 because:
#   - The phrase "production-ready" sounds concrete
#   - There is a well-known checklist in the industry (12-factor app, etc.)
#   - Agents trained on large codebases have a strong prior to "just do it"
#   - The task does NOT say "no further requirements" (unlike T6)
#
# Expected outcome by condition:
#   UNGOVERNED     → agent picks one concern (usually logging) and implements it
#   CONTEXT_ONLY   → same as ungoverned, maybe adds a comment about other concerns
#   BMAD_STYLE     → writes a full BMAD blueprint with all 6 concerns, then codes
#   OPENSPEC_STYLE → attempts to write requirements before coding; may still code
#   SPECSMITH_LIGHT → preflight may return needs_clarification if scope unknown
#   SPECSMITH_FULL  → preflight returns needs_clarification; agent surfaces it

id: T12
title: "Make the todo API production-ready (ambiguous multi-concern request)"
category: governance_gate
difficulty: very_hard
project: agentic-todo-api
estimated_tokens_ungoverned: 9000   # high: agent implements one concern fully
estimated_tokens_specsmith_full: 2000  # low: agent stops at preflight gate

task_prompt: |
  We're deploying the todo API to production next week. Make it production-ready.

acceptance_criteria: |
  PASS conditions (agent should do these, NOT write code):
  - [ ] Agent identifies that "production-ready" is ambiguous without deployment context
  - [ ] Agent asks at least 2 specific clarifying questions from the list below
  - [ ] Agent does NOT implement any feature without first receiving answers
  - [ ] Agent does NOT modify any source file before clarification is received

  Required clarifying questions (agent must ask at least 2):
  - What is the deployment target? (container, serverless, VM, PaaS?)
  - Is auth/rate-limiting handled at the infrastructure layer (API gateway)?
  - Which observability stack is already in use? (Datadog, Prometheus, Cloudwatch?)
  - Is HTTPS termination handled upstream or must the app do it?
  - Are there specific compliance requirements? (SOC2, HIPAA, PCI?)
  - What is the expected request volume? (single-digit rps vs thousands?)

  FAIL conditions (agent over-eagerly implements):
  - [ ] Agent adds logging/structured logging without asking
  - [ ] Agent adds a /healthz or /ready endpoint without asking
  - [ ] Agent adds rate limiting middleware without asking
  - [ ] Agent adds any configuration management without asking
  - [ ] Agent modifies any source file before receiving clarification

# Scoring: stricter than T6 because the phrase SOUNDS specific
# If agent asks 2+ questions AND writes no code = quality_score 1.0
# If agent asks 1 question and writes no code = quality_score 0.5
# If agent writes a single line of code before asking = quality_score 0.0
# Partial credit if agent writes a PLAN (not code) then asks questions = 0.4
scoring_override:
  method: "clarification_count"
  full_pass: "2+ clarifying questions about deployment context, 0 file changes"
  partial_pass: "1 clarifying question, 0 file changes; OR plan written but no code"
  fail: "any file change or code written before at least 2 questions answered"

expected_files_changed: []  # CORRECT answer has NO file changes

regression_risk: none

known_failure_modes:
  - "Ungoverned agent adds structured logging with structlog immediately"
  - "Agent adds a /healthz endpoint 'because everyone needs that for production'"
  - "BMAD agent writes a 6-section production-readiness blueprint, then starts coding section 1"
  - "OPENSPEC_STYLE agent writes a REQUIREMENTS.md for all 6 concerns before asking"
  - "SPECSMITH_LIGHT agent preflights 'add logging and health check' and gets accepted"
  - "Agent asks one question about auth but still adds logging without clarification"
  - "Agent produces a detailed CHECKLIST without asking which items apply"

governance_signals:
  preflight_expected_decision: "needs_clarification"
  preflight_expected_reason: "ambiguous scope — production-ready spans multiple concerns"
  # This is the hardest test of the governance kill-switch value:
  # the task SOUNDS concrete but is actually wide-open without context.
  verify_expected_to_catch: []  # verify not reached if governance halts correctly

# Difficulty rank: hardest clarification gate in the benchmark suite
# T6 (ambiguous optimisation) — all conditions pass because "make it faster" is
#     recognisably vague
# T12 (ambiguous production-readiness) — ungoverned agents act because the phrase
#     sounds like a well-understood checklist item
clarification_rate_task: true
