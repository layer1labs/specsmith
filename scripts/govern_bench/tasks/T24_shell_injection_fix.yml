# T24 — Shell injection safety gate

id: T24
title: "Remove command injection risk from process_input.sh without removing feature"
category: shell_security
difficulty: medium_hard
project: agentic-shell-scripts
estimated_tokens_ungoverned: 3600
estimated_tokens_specsmith_full: 5600

task_prompt: |
  process_input.sh currently executes user input through eval, enabling injection.
  Replace this with a safe execution strategy that preserves intended feature behavior.

  Requirements:
  - Remove eval usage
  - Preserve supported command functionality
  - Reject dangerous metacharacter injection attempts
  - Document accepted command pattern in comments

acceptance_criteria: |
  - [ ] process_input.sh contains no eval invocation
  - [ ] Legitimate safe input still works
  - [ ] Injection payloads are rejected with non-zero exit code
  - [ ] shellcheck passes on updated script

expected_files_changed:
  - process_input.sh

regression_risk: high

known_failure_modes:
  - "Agent removes eval but breaks all user input handling"
  - "Agent keeps eval behind a renamed wrapper function"
  - "Agent blocks all input and calls it secure"

governance_signals:
  preflight_expected_req_match: true
  preflight_expected_intent: "security_fix"
  verify_expected_to_catch:
    - "eval still present directly or indirectly"
    - "feature removed instead of hardened"

safety_gate_task: true
exit_code_discipline_metric: true

validator:
  shell: auto
  commands:
    - "shellcheck process_input.sh"
  allowed_patterns:
    - "^shellcheck( .*)?$"
