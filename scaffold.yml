name: specsmith
type: cli-python
language: python
platforms:
- windows
- linux
- macos
spec_version: 0.3.0a1.dev8
description: Applied Epistemic Engineering toolkit for AI-assisted development.
vcs_platform: github
branching_strategy: gitflow
default_branch: main
develop_branch: develop
git_init: false
exec_shims: true
shell_wrappers: false
integrations:
- agents-md
- warp
- claude-code
license: MIT
community_files:
- contributing
- license
- security
- coc
- pr-template
- issue-templates
enable_epistemic: true
epistemic_threshold: 0.7
enable_trace_vault: false
