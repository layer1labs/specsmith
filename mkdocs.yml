site_name: specsmith
site_description: Lean governance for requirements, tests, epistemic context, evidence, and AI-assisted development.
site_url: https://specsmith.readthedocs.io
repo_url: https://github.com/layer1labs/specsmith
repo_name: layer1labs/specsmith
edit_uri: edit/main/docs/site/

docs_dir: docs/site

hooks:
  - docs/hooks.py

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - navigation.tabs

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started.md
    - Quickstart: quickstart.md
  - Foundations:
    - Architecture: architecture-diagrams.md
    - Applied Epistemic Engineering:
      - AEE Primer (Full Guide): aee-primer.md
      - epistemic Library Reference: epistemic-library.md
    - Governance Model: governance.md
    - Policy: policy.md
    - YAML Governance: yaml-governance.md
    - Work Item Lifecycle: wi-lifecycle.md
    - Project Types: project-types.md
  - Agentic Runtime:
    - CLI Commands: commands.md
    - Invocation Strategy: invocation-strategy.md
    - Epistemic Chat Handoffs: epistemic-handoffs.md
    - Agentic Client:
      - Overview: agent-client.md
      - Standalone CLI: standalone-cli.md
      - Agent Integrations: agent-integrations.md
      - Warp Integration: warp-integration.md
      - Zoo Code / Roo Code: zoo-code-roo.md
      - BYOE Endpoints: endpoints.md
      - Grace REPL: kairos-terminal.md
    - Skills Index: skills-index.md
    - Tool Registry: tool-registry.md
  - Reference:
    - Importing: importing.md
    - Configuration: configuration.md
    - Doctor: doctor.md
    - Rate Limit Pacing: rate-limits.md
    - API Stability: api-stability.md
    - Troubleshooting: troubleshooting.md
    - Releasing: releasing.md
    - Contributing: contributing.md
  - ESDB:
    - Overview & Licensing: esdb.md
    - Installation: esdb/installation.md
    - Quick Start: esdb/quickstart.md
    - Concepts:
      - OEA Anti-Hallucination Fields: esdb/oea-fields.md
      - WAL & Hash Chain: esdb/wal-hash-chain.md
    - API Reference:
      - ChronoStore: esdb/api-store.md
      - ChronoRecord: esdb/api-record.md
      - EsdbBridge: esdb/api-bridge.md
    - Changelog: esdb/changelog.md
  - Benchmarks:
    - Governance Efficiency: efficiency-benchmark.md
    - Model Comparison: model-comparison.md
    - Long-Horizon & Weakness Audit: benchmark-audit.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
